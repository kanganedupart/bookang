// 모달 드래그 기능
function makeDraggable(modalEl) {
  if (!modalEl) return;
  // drag-handle이 명시되지 않은 경우 modal-title을 자동으로 핸들로 사용
  let handle = modalEl.querySelector('.drag-handle');
  if (!handle) {
    handle = modalEl.querySelector('.modal-title');
    if (handle) {
      handle.classList.add('drag-handle');
      handle.style.cursor = 'move';
      // 드래그 안내 표시 추가 (이미 있으면 스킵)
      if (!handle.querySelector('.drag-hint')) {
        const hint = document.createElement('span');
        hint.className = 'drag-hint';
        hint.style.cssText = 'font-size:11px;font-weight:400;color:var(--text-faint);float:right;';
        hint.textContent = '⋮⋮ 드래그';
        handle.appendChild(hint);
      }
    }
  }
  if (!handle) return;

  let isDragging = false;
  let startX = 0, startY = 0;
  let offsetX = 0, offsetY = 0;

  handle.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
    isDragging = true;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    modalEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      document.body.style.userSelect = '';
    }
  });
}

// 모달 자동 드래그 적용 (MutationObserver로 새로 만들어지는 모달 감지)
const _modalObserver = new MutationObserver((mutations) => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType === 1 && node.classList && node.classList.contains('modal-backdrop')) {
        const modal = node.querySelector('.modal');
        if (modal && !modal.dataset.draggableApplied) {
          modal.dataset.draggableApplied = '1';
          makeDraggable(modal);
        }
      }
    });
  });
});
_modalObserver.observe(document.body, { childList: true });

function startBookUploadFlow() {

  document.getElementById('bookFileInput').value = '';
  document.getElementById('bookFileInput').click();

function handleBookFileUpload(file) {
  file.arrayBuffer().then(buf => {
    try {
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) { toast('엑셀에 데이터가 없습니다', true); return; }

      // 헤더 찾기
      let headerRowIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].some(c => String(c).trim())) { headerRowIdx = i; break; }
      }
      const headers = rows[headerRowIdx].map(h => String(h || '').trim().toLowerCase());

      // 자동 컬럼 매칭
      const findCol = (...keys) => {
        for (let i = 0; i < headers.length; i++) {
          if (keys.some(k => headers[i].includes(k.toLowerCase()))) return i;
        }
        return -1;
      };
      const colSubject = findCol('과목', 'subject');
      const colTeacher = findCol('강사', 'teacher');
      const colName = findCol('교재명', '교재 명', '교재', 'book', 'name');
      const colPrice = findCol('교재비', '가격', '단가', 'price');

      if (colSubject < 0 || colTeacher < 0 || colName < 0) {
        toast('양식 컬럼(과목/강사/교재명)을 찾을 수 없습니다. 양식을 다운받아 사용하세요.', true);
        return;
      }

      const dataRows = rows.slice(headerRowIdx + 1)
        .filter(r => r.some(c => String(c).trim()))
        .map(r => ({
          subject: String(r[colSubject] || '').trim(),
          teacher: String(r[colTeacher] || '').trim(),
          name: String(r[colName] || '').trim(),
          price: colPrice >= 0 ? parseInt(String(r[colPrice] || '0').replace(/[^\d-]/g, ''), 10) || 0 : 0,
        }))
        // 예시 행 제외
        .filter(r => r.subject && r.teacher && r.name && !r.name.startsWith('(예시)'));

      if (dataRows.length === 0) {
        toast('유효한 데이터가 없습니다', true);
        return;
      }

      openBookUploadPreview(dataRows);
    } catch (err) {
      console.error(err);
      toast('엑셀 파일을 읽을 수 없습니다: ' + err.message, true);
    }
  });
}

function openBookUploadPreview(rows) {
  const td = getCurrentTargetData();

  // 중복 체크
  const existingKeys = new Set(td.books.map(b => b.subject + '||' + b.teacher + '||' + b.name));
  const inFileKeys = new Set();
  const processed = rows.map(r => {
    const k = r.subject + '||' + r.teacher + '||' + r.name;
    let status = 'new';
    if (existingKeys.has(k)) status = 'duplicate';
    else if (inFileKeys.has(k)) status = 'duplicate-in-file';
    inFileKeys.add(k);
    return { ...r, status, key: k };
  });

  const newCount = processed.filter(r => r.status === 'new').length;
  const dupCount = processed.length - newCount;

  const html = `
    <div class="modal modal-xl">

function addStudentManual() {
  if (!state.currentTargetId) { toast('대상을 먼저 선택하세요', true); return; }
  const td = getCurrentTargetData();

  const subjects = [...new Set(td.classes.map(c => c.subject))].sort();
  const selection = {};
  subjects.forEach(s => { selection[s] = { teacher: '', classId: '' }; });

  showStudentForm({
    title: '학생 추가',
    desc: '학생명을 입력하고, 과목별로 강사와 반을 선택합니다. 안 듣는 과목은 비워두면 됩니다.',
    initialName: '',
    selection,
    onConfirm: (name, finalSelection, setError) => {
      if (!name) { setError('학생명을 입력해주세요.'); return false; }
      if (td.students.some(s => s.name === name)) {
        setError('같은 이름의 학생이 이미 있습니다.');
        return false;
      }
      const classIds = Object.values(finalSelection).map(v => v.classId).filter(Boolean);
      td.students.push({ id: uid('s'), name, classIds });
      saveData();
      toast(`✅ ${name} 학생이 추가되었습니다`);
      render();
      return true;
    }
  });
}

// 학생 추가/편집 공통 폼
function showStudentForm({ title, desc, initialName, selection, showDelete, onDelete, onConfirm }) {
  const td = getCurrentTargetData();
  const subjects = Object.keys(selection);

  const teachersBySubject = {};
  subjects.forEach(subj => {
    teachersBySubject[subj] = [...new Set(
      td.classes.filter(c => c.subject === subj).map(c => c.teacher || '(강사 미입력)')
    )].sort();
  });

  const html = `
    <div class="modal modal-lg">
      <div class="modal-title">${escapeHtml(title)}</div>
      <div class="modal-desc">${escapeHtml(desc)}</div>

      <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);">학생명</label>
      <input type="text" class="modal-input" id="sfName" value="${escapeHtml(initialName)}" placeholder="예: (선아)김도영3265">

      <label style="display:block;margin: 14px 0 8px;font-size:13px;font-weight:600;">
        소속 반 <span style="font-weight:400;color:var(--text-dim);">(과목별 강사 → 반 선택. 안 듣는 과목은 비워두기)</span>
      </label>

      <div style="max-height: 380px; overflow-y: auto; border:1px solid var(--border); border-radius:8px; padding: 10px; display: grid; gap: 10px;">
        ${subjects.length === 0
          ? '<div style="text-align:center;padding:30px 0;color:var(--text-dim);font-size:13px;">등록된 과목이 없습니다.</div>'
          : subjects.map(subj => renderSubjectCard(subj, selection[subj], teachersBySubject[subj], td)).join('')
        }
      </div>

      <div class="modal-error" id="sfError" style="margin-top:10px;"></div>
      <div class="modal-actions">
        ${showDelete ? '<button class="btn btn-ghost btn-danger" id="sfDelete" style="margin-right:auto;">학생 삭제</button>' : ''}
        <button class="btn btn-ghost" id="sfCancel">취소</button>
        <button class="btn btn-primary" id="sfConfirm">저장</button>
      </div>
    </div>
  `;

  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);

  bd.querySelector('#sfCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  bd.querySelector('#sfName').focus();

  bd.querySelectorAll('.teacher-select').forEach(sel => {
    sel.onchange = (e) => {
      const card = e.target.closest('.subject-card');
      const subj = card.dataset.subject;
      const teacher = e.target.value;
      selection[subj].teacher = teacher;
      selection[subj].classId = '';

      const classSelect = card.querySelector('.class-select');
      if (!teacher) {
        classSelect.innerHTML = '<option value="">— 강사 먼저 선택 —</option>';
        classSelect.disabled = true;
      } else {
        const filteredClasses = td.classes.filter(c =>
          c.subject === subj && (c.teacher || '(강사 미입력)') === teacher
        );
        classSelect.innerHTML = '<option value="">— 반 선택 —</option>' +
          filteredClasses.map(c => `<option value="${c.id}">${escapeHtml(c.className)}</option>`).join('');
        classSelect.disabled = false;
      }
    };
  });

  bd.querySelectorAll('.class-select').forEach(sel => {
    sel.onchange = (e) => {
      const card = e.target.closest('.subject-card');
      const subj = card.dataset.subject;
      selection[subj].classId = e.target.value;
    };
  });

  if (showDelete && onDelete) {
    bd.querySelector('#sfDelete').onclick = () => {
      bd.remove();
      onDelete();
    };
  }

  bd.querySelector('#sfConfirm').onclick = () => {
    const name = bd.querySelector('#sfName').value.trim();
    const err = bd.querySelector('#sfError');
    err.textContent = '';
    const result = onConfirm(name, selection, (msg) => { err.textContent = msg; });
    if (result) bd.remove();
  };
}

function renderSubjectCard(subj, sel, teachers, td) {
  let classOptions = '<option value="">— 강사 먼저 선택 —</option>';
  let classDisabled = true;
  if (sel.teacher) {
    const filteredClasses = td.classes.filter(c =>
      c.subject === subj && (c.teacher || '(강사 미입력)') === sel.teacher
    );
    classOptions = '<option value="">— 반 선택 —</option>' +
      filteredClasses.map(c =>
        `<option value="${c.id}" ${c.id === sel.classId ? 'selected' : ''}>${escapeHtml(c.className)}</option>`
      ).join('');
    classDisabled = false;
  }

  return `
    <div class="subject-card" data-subject="${escapeHtml(subj)}" style="border:1px solid var(--border); border-radius:8px; padding: 10px 12px; background: var(--bg-card);">
      <div style="font-size:13px;font-weight:700;color:var(--accent-dark);margin-bottom:8px;">
        ${escapeHtml(subj)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:8px;">
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">강사</label>
          <select class="col-match-select teacher-select" style="width:100%;">
            <option value="">— 안 들음 —</option>
            ${teachers.map(t => `<option value="${escapeHtml(t)}" ${t === sel.teacher ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">반</label>
          <select class="col-match-select class-select" style="width:100%;" ${classDisabled ? 'disabled' : ''}>
            ${classOptions}
          </select>
        </div>
      </div>
    </div>
  `;
}

                              <span style="font-size: 16px;">${distributed ? '✅' : '❌'}</span>
                              <span style="font-size: 12px; color: ${distributed ? 'var(--success)' : 'var(--text-dim)'};">
                                ${distributed ? '배부완료' : '미배부'}
                              </span>
                            </div>
                          </td>
                        `).join('')}
                        <td style="padding: 12px; text-align: center;">
                          <div style="font-size: 14px; font-weight: 600; color: ${isComplete ? 'var(--success)' : distributedCount > 0 ? 'var(--warning)' : 'var(--danger)'};">
                            ${distributedCount}/${totalCount}
                          </div>
                        </td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          `}
        </div>
      `}
    </div>
  `;
}

// ============================================================
// 반-교재 매칭
// ============================================================

let matchingFilter = { subject: '', teacher: '', classId: '' };
let matchingExpanded = new Set();

function renderMatchingSection() {
  const td = getCurrentTargetData();
  const classes = td.classes;
  const books = td.books;

  if (classes.length === 0 || books.length === 0) {
    return `
      <div class="section">
        <div class="empty-state">
          <div class="empty-state-text">
            ${classes.length === 0 ? '반이 없습니다. 학생 관리 탭에서 반을 먼저 추가하세요.' : ''}
            ${books.length === 0 ? '교재가 없습니다. 위에서 교재를 먼저 등록하세요.' : ''}
          </div>
        </div>
      </div>
    `;
  }

  // 필터 옵션
  const subjects = [...new Set(classes.map(c => c.subject))].sort();
  const teacherOpts = [...new Set(
    classes
      .filter(c => !matchingFilter.subject || c.subject === matchingFilter.subject)
      .map(c => c.teacher || '(강사 미입력)')
  )].sort();
  const classOpts = classes
    .filter(c => !matchingFilter.subject || c.subject === matchingFilter.subject)
    .filter(c => !matchingFilter.teacher || (c.teacher || '(강사 미입력)') === matchingFilter.teacher);

  if (matchingFilter.teacher && !teacherOpts.includes(matchingFilter.teacher)) matchingFilter.teacher = '';
  if (matchingFilter.classId && !classOpts.some(c => c.id === matchingFilter.classId)) matchingFilter.classId = '';

  const resultClasses = classOpts
    .filter(c => !matchingFilter.classId || c.id === matchingFilter.classId)
    .sort((a, b) => {
      if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
      if ((a.teacher || '') !== (b.teacher || '')) return (a.teacher || '').localeCompare(b.teacher || '');
      return a.className.localeCompare(b.className);
    });

  // 통계
  const totalClasses = classes.length;
  const matchedClasses = classes.filter(c => c.bookIds && c.bookIds.length > 0).length;

  // 자동 펼침: 강사까지 좁혀지면
  const autoExpand = !!matchingFilter.teacher;

  return `
    <div class="section">
      <div class="section-head">
        <div class="section-title-wrap">
          <div class="section-title">반별 매칭 현황 (${resultClasses.length}개)</div>
          <div class="section-desc">반을 클릭하면 매칭된 교재가 펼쳐집니다. "매칭 편집" 버튼으로 교재를 추가/제거합니다.</div>
        </div>
        <button class="btn btn-ghost btn-sm" id="matchingFilterResetBtn">초기화</button>
      </div>

      <div class="result-stats" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 14px;">
        <div class="stat-card">
          <div class="stat-label">전체 반</div>
          <div class="stat-value">${totalClasses}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">매칭 완료</div>
          <div class="stat-value">${matchedClasses} <span style="font-size:13px;color:var(--text-dim);">/ ${totalClasses}</span></div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">과목</label>
          <select class="col-match-select" id="matchingFilterSubject" style="width:100%;">
            <option value="">전체 (${subjects.length}개)</option>
            ${subjects.map(s => `<option value="${escapeHtml(s)}" ${matchingFilter.subject === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">강사</label>
          <select class="col-match-select" id="matchingFilterTeacher" style="width:100%;">
            <option value="">전체 (${teacherOpts.length}명)</option>
            ${teacherOpts.map(t => `<option value="${escapeHtml(t)}" ${matchingFilter.teacher === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">반</label>
          <select class="col-match-select" id="matchingFilterClass" style="width:100%;">
            <option value="">전체 (${classOpts.length}개)</option>
            ${classOpts.map(c => `<option value="${escapeHtml(c.id)}" ${matchingFilter.classId === c.id ? 'selected' : ''}>${escapeHtml(c.className)}</option>`).join('')}
          </select>
        </div>
      </div>

      ${resultClasses.length === 0
        ? '<div class="empty-state"><div class="empty-state-text">조건에 맞는 반이 없습니다.</div></div>'
        : `<div style="display:grid; gap:8px;">${resultClasses.map(c => renderMatchingClassCard(c, td, autoExpand)).join('')}</div>`
      }
    </div>
  `;
}

function renderMatchingClassCard(c, td, autoExpand) {
  const expanded = autoExpand || matchingExpanded.has(c.id);
  const matchedBooks = (c.bookIds || []).map(bid => td.books.find(b => b.id === bid)).filter(Boolean);
  const studentCount = td.students.filter(s => s.classIds.includes(c.id)).length;

  return `
    <div style="border:1px solid var(--border); border-radius:10px; background: var(--bg-card); overflow:hidden; ${matchedBooks.length === 0 ? 'border-color: #F2D89A;' : ''}">
      <div data-toggle-matching-class="${c.id}" style="display:flex; justify-content:space-between; align-items:center; padding: 12px 16px; cursor:pointer; user-select:none; ${expanded ? 'border-bottom:1px solid var(--border);' : ''}">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1;">
          <span class="badge badge-subject">${escapeHtml(c.subject)}</span>
          ${c.teacher ? `<span class="badge badge-teacher">${escapeHtml(c.teacher)}</span>` : '<span style="color:var(--text-faint);font-size:11px;">강사 미입력</span>'}
          <span style="font-weight:600;">${escapeHtml(c.className)}</span>
          <span style="color:var(--text-dim); font-size:12.5px;">학생 ${studentCount}명</span>
          ${matchedBooks.length === 0
            ? '<span class="badge" style="background:#FFF7E6;color:#7A5A12;">매칭 없음</span>'
            : `<span style="color:var(--accent-dark); font-size:12.5px; font-weight:600;">교재 ${matchedBooks.length}개</span>`
          }
        </div>
        <div style="display:flex; gap:6px; align-items:center;">
          <button class="btn btn-primary btn-sm" data-edit-matching="${c.id}">매칭 편집</button>
          <span style="font-size:12px; color:var(--text-dim); min-width:14px; text-align:center;">${expanded ? '▲' : '▼'}</span>
        </div>
      </div>
      ${expanded ? `
        <div style="padding: 10px 16px 14px;">
          ${matchedBooks.length === 0
            ? '<div style="text-align:center;padding:14px;color:var(--text-faint);font-size:12.5px;">아직 매칭된 교재가 없습니다.</div>'
            : `<table class="data-table" style="font-size:13px;">
                <thead>
                  <tr>
                    <th>교재명</th>
                    <th style="width:140px;">제작 강사</th>
                  </tr>
                </thead>
                <tbody>
                  ${matchedBooks.map(b => `
                    <tr ${b.teacher !== c.teacher ? 'style="background: #FFF7E6;"' : ''}>
                      <td>${escapeHtml(b.name)} ${b.teacher !== c.teacher ? '<span style="font-size:10px;color:var(--warning);">교차매칭</span>' : ''}</td>
                      <td>${escapeHtml(b.teacher)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>`
          }
        </div>
      ` : ''}
    </div>
  `;
}

function editClassMatching(classId) {
  const td = getCurrentTargetData();
  const c = td.classes.find(x => x.id === classId);
  if (!c) return;
  const books = td.books;

  // 같은 강사의 교재 vs 다른 강사의 교재
  const sameTeacherBooks = books.filter(b => b.subject === c.subject && b.teacher === c.teacher)
    .sort((a, b) => a.name.localeCompare(b.name));
  const otherBooks = books.filter(b => !(b.subject === c.subject && b.teacher === c.teacher))
    .sort((a, b) => {
      if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
      if (a.teacher !== b.teacher) return a.teacher.localeCompare(b.teacher);
      return a.name.localeCompare(b.name);
    });

  // 현재 매칭된 ID 셋
  const matchedIds = new Set(c.bookIds || []);

  // 같은 강사의 다른 반 (복사 기능용)
  const sameTeacherClasses = td.classes.filter(x =>
    x.id !== classId &&
    x.subject === c.subject &&
    x.teacher === c.teacher &&
    x.bookIds && x.bookIds.length > 0
  );

  let showOtherTeachers = otherBooks.some(b => matchedIds.has(b.id));

  function buildHtml() {
    const sameTeacherSection = sameTeacherBooks.length > 0 ? `
      <div style="font-size:12px;font-weight:700;color:var(--accent-dark);margin: 8px 0 6px;">
        📌 ${escapeHtml(c.subject)} · ${escapeHtml(c.teacher || '강사 미입력')} 교재 (추천) — ${sameTeacherBooks.length}개
      </div>
      <div style="border:1px solid var(--border); border-radius:8px; background:var(--bg-card); padding: 6px;">
        ${sameTeacherBooks.map(b => `
          <label style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:13px;">
            <input type="checkbox" class="emBookCheck" value="${b.id}" ${matchedIds.has(b.id) ? 'checked' : ''}>
            <span style="flex:1;">${escapeHtml(b.name)}</span>
          </label>
        `).join('')}
      </div>
    ` : '<div style="color:var(--text-faint);font-size:12px;padding:8px 0;">📌 같은 강사의 교재가 없습니다. (교재 등록을 먼저 하세요)</div>';

    const otherSection = otherBooks.length > 0 ? `
      <div style="margin-top: 14px;">
        <button class="btn btn-ghost btn-sm" id="emToggleOther" style="font-size:12px;">
          ${showOtherTeachers ? '▼' : '▶'} 다른 강사의 교재 (${otherBooks.length}개) — 교차 매칭용
        </button>
        ${showOtherTeachers ? `
          <div style="border:1px solid var(--border); border-radius:8px; background:var(--bg-card); padding: 6px; margin-top: 6px; max-height: 220px; overflow-y: auto;">
            ${otherBooks.map(b => `
              <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:13px;">
                <input type="checkbox" class="emBookCheck" value="${b.id}" ${matchedIds.has(b.id) ? 'checked' : ''}>
                <span class="badge badge-subject" style="font-size:10px;">${escapeHtml(b.subject)}</span>

let stockFilter = {
  subject: '',

  query: ''
};
let pendingStockIn = {}; // bookId → qty (저장 전 임시)

// 한글 자음 추출 (초성)
const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function extractChosung(str) {
  let result = '';
  for (const ch of str) {
    const code = ch.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const idx = Math.floor((code - 0xAC00) / 588);
      result += CHOSUNG[idx];
    } else {
      result += ch.toLowerCase();
    }
  }
  return result;
}
// 검색 매칭 (자음 검색 지원)
function matchesQuery(target, query) {
  if (!query) return true;
  const t = target.toLowerCase();
  const q = query.toLowerCase().trim();
  if (t.includes(q)) return true;
  // 자음 매칭
  const tChosung = extractChosung(target);
  return tChosung.includes(q);
}

// 교재의 현재 배부 중인 수량
function getDistributedCount(bookId, td) {
  let count = 0;
  Object.values(td.distributions).forEach(d => {
    if (d.bookId === bookId && d.status === 'distributed') count++;
  });
  return count;
}

// 교재의 회수된 수량 (status가 returned인 것)
function getReturnedCount(bookId, td) {
  let count = 0;
  Object.values(td.distributions).forEach(d => {
    if (d.bookId === bookId && d.status === 'returned') count++;
  });
  return count;
}

// 교재 현재 재고
// 현재 재고 = 입고 누적 - 지금 배부 중인 양
// (회수된 책은 다시 재고로 돌아왔으므로, status='returned'인 건 빼지 않음)
function getCurrentStock(book, td) {
  const distributed = getDistributedCount(book.id, td);
  return (book.stockIn || 0) - distributed;
}

// 재고현황
function renderInventoryStatus(td) {
  const books = td.books;
  
  // 공통 과목 제외
  const stockBooks = books.filter(b => {
    const cls = td.classes.find(c => c.bookIds && c.bookIds.includes(b.id));
    return !cls || (cls.subject !== '공통' && !cls.isCommon);
  });
  
  // 과목별 그룹핑
  const grouped = {};
  stockBooks.forEach(book => {
    const key = `${book.subject}||${book.teacher}`;
    if (!grouped[key]) {
      grouped[key] = {
        subject: book.subject,
        teacher: book.teacher,
        books: []
      };
    }
    
    // 배부/회수 계산
    const dist = td.distributions || {};
    let totalDist = 0;
    let totalReturn = 0;
    
    Object.values(dist).forEach(classDistObj => {
      Object.values(classDistObj).forEach(bookDistObj => {
        if (bookDistObj.bookId === book.id) {
          totalDist += (bookDistObj.distributed || []).length;
          totalReturn += (bookDistObj.returned || []).length;
        }
      });
    });
    
    grouped[key].books.push({
      id: book.id,
      name: book.name,
      stockIn: book.stockIn || 0,
      additionalIn: book.additionalStockIn || 0,
      distributed: totalDist,
      additionalDist: 0, // 추가배부는 별도 로직 필요
      returned: totalReturn,
      current: (book.stockIn || 0) + (book.additionalStockIn || 0) - totalDist + totalReturn
    });
  });
  
  return `
    <div class="section">
      <div class="section-head">
        <div class="section-title-wrap">
          <div class="section-title">📊 재고현황</div>

              <th style="text-align:center;">입고</th>
              <th style="text-align:center;">추가입고</th>
              <th style="text-align:center;">배부</th>
              <th style="text-align:center;">회수</th>
              <th style="text-align:center; background:#f0f9ff;">현재고</th>
            </tr>
          </thead>
          <tbody>
            ${Object.values(grouped).map(group => {
              const rowspan = group.books.length;
              return group.books.map((book, idx) => `
                <tr>
                  ${idx === 0 ? `
                    <td rowspan="${rowspan}" style="font-weight:500; background:#fafafa;">${escapeHtml(group.subject)}</td>
                    <td rowspan="${rowspan}" style="background:#fafafa;">${escapeHtml(group.teacher)}</td>
                  ` : ''}
                  <td>${escapeHtml(book.name)}</td>
                  <td style="text-align:center;">${book.stockIn}</td>
                  <td style="text-align:center;">${book.additionalIn}</td>
                  <td style="text-align:center;">${book.distributed}</td>
                  <td style="text-align:center;">${book.returned}</td>
                  <td style="text-align:center; font-weight:600; background:#f0f9ff; color:${book.current < 0 ? '#dc2626' : '#000'};">
                    ${book.current}

            }).join('')}

            ` : ''}

// 배부현황
function renderDistributionStatus(td) {
  // 필터 초기화
  if (!window.distFilter) {
    window.distFilter = { subject: '', teacher: '', book: '' };
  }
  const filter = window.distFilter;
  
  // 과목 목록
  const allSubjects = [...new Set(td.classes.map(c => c.subject))].sort();
  
  // 강사 목록 (과목 필터 적용)
  const allTeachers = [...new Set(
    td.classes
      .filter(c => !filter.subject || c.subject === filter.subject)
      .map(c => c.teacher)
  )].sort();
  
  // 교재 목록 (과목/강사 필터 적용)
  const allBooks = [...new Set(
    td.classes
      .filter(c => !filter.subject || c.subject === filter.subject)
      .filter(c => !filter.teacher || c.teacher === filter.teacher)
      .flatMap(c => c.bookIds || [])
      .map(bid => td.books.find(b => b.id === bid))
      .filter(Boolean)
  )].sort((a, b) => a.name.localeCompare(b.name));

        .filter(bid => !filter.book || bid === filter.book)
        .forEach(bookId => {
          const book = td.books.find(b => b.id === bookId);

          let group = bookGroups.find(g => 
            g.subject === cls.subject && 
            g.teacher === cls.teacher && 
            g.bookId === bookId
          );
          
          if (!group) {
            group = {
              subject: cls.subject,
              teacher: cls.teacher,
              bookId: bookId,
              bookName: book.name,

          // 학생 수 계산

            classId: cls.id,
            className: cls.className,
            totalStudents: totalStudents,
            distributedCount: distributedCount
          });
        });

  bookGroups.sort((a, b) => {
    if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
    if (a.teacher !== b.teacher) return (a.teacher || '').localeCompare(b.teacher || '');

                <input type="checkbox" id="checkAllBook" style="margin-right:6px;"> 교재명

              <th style="padding:12px; text-align:center; border-bottom:1px solid #e5e7eb; width:80px; background:#f0f9ff;">

              <th style="padding:12px; text-align:center; border-bottom:1px solid #e5e7eb; width:60px;">

// 배부 체크박스 기능
function initDistributionCheckboxes() {
  // 전체 과목 체크
  const checkAllSubject = document.getElementById('checkAllSubject');
  if (checkAllSubject) {
    checkAllSubject.addEventListener('change', function() {
      const checkboxes = document.querySelectorAll('.check-subject');
      checkboxes.forEach(cb => cb.checked = this.checked);
    });
  }
  
  // 전체 교재 체크
  const checkAllBook = document.getElementById('checkAllBook');
  if (checkAllBook) {
    checkAllBook.addEventListener('change', function() {
      const checkboxes = document.querySelectorAll('.check-book');
      checkboxes.forEach(cb => cb.checked = this.checked);
    });
  }
  
  // 전체 반 체크
  const checkAllClass = document.getElementById('checkAllClass');
  if (checkAllClass) {
    checkAllClass.addEventListener('change', function() {
      const checkboxes = document.querySelectorAll('.check-class');
      checkboxes.forEach(cb => cb.checked = this.checked);
    });
  }
}

// 일괄 배부
function handleBulkDistribute() {
  const td = getCurrentTargetData();
  
  // 체크된 반들 수집
  const checkedClassIds = Array.from(document.querySelectorAll('.check-class:checked'))
    .map(cb => cb.dataset.class);
  
  if (checkedClassIds.length === 0) {
    alert('배부할 반을 선택해주세요.');
    return;
  }
  
  // 체크된 교재들 수집
  const checkedBookIds = Array.from(document.querySelectorAll('.check-book:checked'))
    .map(cb => cb.dataset.book);
  
  console.log('체크된 반:', checkedClassIds);
  console.log('체크된 교재:', checkedBookIds);
  
  // 배부할 학생 수 계산
  let totalStudents = 0;
  const distributionData = [];
  
  checkedClassIds.forEach(classId => {
    const cls = td.classes.find(c => c.id === classId);
    if (!cls || !cls.bookIds) return;
    
    const students = td.students.filter(s => s.classIds && s.classIds.includes(classId));
    
    // 체크된 교재만 또는 교재 체크 없으면 모든 교재
    const bookIdsToProcess = checkedBookIds.length > 0 
      ? cls.bookIds.filter(bid => checkedBookIds.includes(bid))
      : cls.bookIds;
    
    bookIdsToProcess.forEach(bookId => {
      students.forEach(student => {
        // 이미 배부된 학생은 제외
        const alreadyDistributed = Object.values(td.distributions).some(d => 
          d.studentId === student.id && 
          d.bookId === bookId && 
          d.status === 'distributed'
        );
        
        if (!alreadyDistributed) {
          distributionData.push({
            studentId: student.id,
            studentName: student.name,
            classId: classId,
            className: cls.className,
            bookId: bookId
          });
          totalStudents++;
        }
      });
    });
  });
  
  if (totalStudents === 0) {
    alert('배부할 학생이 없습니다. (이미 모두 배부됨)');
    return;
  }
  
  // 모달 표시
  showDistributionModal(distributionData, totalStudents);
}

// 배부 모달 (전역 변수 사용)
let pendingDistributionData = null;

function showDistributionModal(distributionData, totalStudents) {
  console.log('=== 배부 모달 표시 ===', {
    totalStudents,
    dataLength: distributionData.length
  });
  
  // 전역 변수에 저장
  pendingDistributionData = distributionData;
  
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:9999;';
  modal.id = 'distributionModal';
  
  const modalContent = document.createElement('div');
  modalContent.style.cssText = 'background:white; border-radius:12px; padding:24px; min-width:400px; max-width:600px;';
  
  modalContent.innerHTML = `
    <h3 style="margin:0 0 16px 0; font-size:18px;">배부 확인</h3>
    <div style="margin-bottom:20px; padding:16px; background:#f9fafb; border-radius:8px;">
      <div style="font-size:15px; margin-bottom:8px;">
        <strong>${totalStudents}명</strong>의 학생에게 교재를 배부합니다.
      </div>
      <div style="font-size:13px; color:#6b7280;">
        배부 후 재고가 바로 업데이트됩니다.
      </div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-ghost dist-cancel-btn">취소</button>
      <button class="btn btn-primary dist-confirm-btn">배부</button>
    </div>
  `;
  
  modal.appendChild(modalContent);
  document.body.appendChild(modal);
  
  // 이벤트 리스너 - modalContent 내부에서 찾기
  const cancelBtn = modalContent.querySelector('.dist-cancel-btn');
  const confirmBtn = modalContent.querySelector('.dist-confirm-btn');
  
  if (!cancelBtn || !confirmBtn) {
    console.error('버튼을 찾을 수 없습니다!');
    return;
  }
  
  console.log('버튼 찾기 성공!', { cancelBtn, confirmBtn });
  
  cancelBtn.onclick = () => {
    console.log('취소 클릭');
    modal.remove();
    pendingDistributionData = null;
  };
  
  confirmBtn.onclick = () => {
    console.log('배부 클릭', { pendingDistributionData });
    if (pendingDistributionData) {
      const dataToDistribute = pendingDistributionData;
      
      // 버튼 비활성화 및 텍스트 변경
      confirmBtn.disabled = true;
      confirmBtn.textContent = '처리 중...';
      confirmBtn.style.opacity = '0.6';
      confirmBtn.style.cursor = 'not-allowed';
      
      // 약간의 딜레이 후 실행
      setTimeout(() => {
        // 모달 닫기
        modal.remove();
        pendingDistributionData = null;
        
        // 배부 실행
        executeDistribution(dataToDistribute);
      }, 100);
    } else {
      console.error('pendingDistributionData가 없습니다!');
    }
  };
  
  // 배경 클릭 시 닫기
  modal.onclick = (e) => {
    if (e.target === modal) {
      console.log('배경 클릭');
      modal.remove();
      pendingDistributionData = null;
    }
  };
}

// 실제 배부 실행
function executeDistribution(distributionData) {
  console.log('=== 배부 실행 시작 ===', {
    dataLength: distributionData.length,
    data: distributionData
  });
  
  const td = getCurrentTargetData();
  const currentUser = '이형빈'; // TODO: 실제 로그인 사용자
  const timestamp = Date.now();
  
  console.log('현재 타겟 데이터:', td);
  
  distributionData.forEach((item, index) => {
    const distId = 'dist_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    td.distributions[distId] = {
      id: distId,
      studentId: item.studentId,
      bookId: item.bookId,
      status: 'distributed',
      distributedAt: timestamp,
      distributedBy: currentUser,
      type: 'regular', // 정규 배부
      memo: ''
    };
    
    if (index < 3) {
      console.log(`배부 ${index + 1}:`, td.distributions[distId]);
    }
  });
  
  console.log('배부 데이터 저장 전, distributions 개수:', Object.keys(td.distributions).length);
  
  saveTargetData(td);
  
  console.log('renderMain 호출 전');
  renderMain(); // 화면 리프레시 (필터 유지됨)
  console.log('renderMain 호출 완료');
  
  // 확실한 완료 메시지
  alert(`✅ ${distributionData.length}건 배부 완료되었습니다!`);
  
  console.log('=== 배부 실행 완료 ===');
}

// 회수
function renderReturnSection(td) {
  // 필터 초기화
  if (!window.returnFilter) {
    window.returnFilter = { subject: '', teacher: '', book: '' };
  }
  const filter = window.returnFilter;
  
  // 과목 목록
  const allSubjects = [...new Set(td.classes.map(c => c.subject))].sort();
  
  // 강사 목록 (과목 필터 적용)

      .filter(c => !filter.subject || c.subject === filter.subject)
      .map(c => c.teacher)
  )].sort();
  
  // 교재 목록 (과목/강사 필터 적용)
  const allBooks = [...new Set(
    td.classes
      .filter(c => !filter.subject || c.subject === filter.subject)
      .filter(c => !filter.teacher || c.teacher === filter.teacher)
      .flatMap(c => c.bookIds || [])
      .map(bid => td.books.find(b => b.id === bid))
      .filter(Boolean)
  )].sort((a, b) => a.name.localeCompare(b.name));
  
  // 교재별 그룹 생성
  const bookGroups = [];

    .filter(c => !filter.subject || c.subject === filter.subject)
    .filter(c => !filter.teacher || c.teacher === filter.teacher)

        .filter(bid => !filter.book || bid === filter.book)

          // 배부된 학생 수 계산

            return Object.values(td.distributions).some(d => 
              d.studentId === s.id &&

              d.status === 'distributed'

          // 회수된 학생 수 계산

            return Object.values(td.distributions).some(d => 
              d.studentId === s.id && 
              d.bookId === bookId && 
              d.status === 'returned'
            );
          }).length;
          
          group.classes.push({

            className: cls.className,
            totalStudents: totalStudents,

            returnedCount: returnedCount
          });
        });

// 회수 - 학생 명단 모달
function showReturnStudentModal(classId, bookId) {
  const td = getCurrentTargetData();
  const cls = td.classes.find(c => c.id === classId);
  const book = td.books.find(b => b.id === bookId);
  
  if (!cls || !book) {
    alert('반 또는 교재 정보를 찾을 수 없습니다.');
    return;
  }
  
  // 해당 반의 학생 목록
  const students = td.students.filter(s => s.classIds && s.classIds.includes(classId));
  
  // 배부 상태 확인
  const studentsWithStatus = students.map(s => {
    const distributed = Object.values(td.distributions).some(d =>
      d.studentId === s.id &&
      d.bookId === bookId &&
      d.status === 'distributed'
    );
    return { ...s, canReturn: distributed };
  });
  
  // 배부된 학생 수
  const distributedCount = studentsWithStatus.filter(s => s.canReturn).length;
  
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:9999;';

  modalContent.style.cssText = 'background:white; border-radius:12px; padding:28px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto;';
  
  modalContent.innerHTML = `
    <h3 style="margin:0 0 8px 0; font-size:18px;">${escapeHtml(cls.className)} 학생 명단</h3>
    <div style="font-size:14px; color:#6b7280; margin-bottom:20px;">
      ${escapeHtml(book.name)} · ${distributedCount}명 배부됨
    </div>
    
    <!-- 학생 목록 -->
    <div style="border:1px solid #e5e7eb; border-radius:8px; margin-bottom:20px; max-height:300px; overflow-y:auto;">
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead style="position:sticky; top:0; background:white; z-index:1;">
          <tr style="background:#f9fafb; border-bottom:1px solid #e5e7eb;">
            <th style="padding:10px; text-align:center; width:40px;">
              <input type="checkbox" id="returnSelectAll" ${distributedCount === 0 ? 'disabled' : ''}>
            </th>
            <th style="padding:10px; text-align:left;">학생</th>
            <th style="padding:10px; text-align:center; width:100px;">상태</th>
          </tr>
        </thead>
        <tbody>
          ${studentsWithStatus.map(s => `
            <tr style="border-bottom:1px solid #f3f4f6;">
              <td style="padding:10px; text-align:center;">
                <input 
                  type="checkbox" 
                  class="return-student-check" 
                  data-student="${escapeHtml(s.id)}"
                  ${!s.canReturn ? 'disabled' : ''}
                >
              </td>
              <td style="padding:10px;">${escapeHtml(s.name)}</td>
              <td style="padding:10px; text-align:center;">
                ${s.canReturn 
                  ? '<span style="color:#15803d; font-weight:500;">✅ 배부</span>' 
                  : '<span style="color:#9ca3af;">❌ 미배부</span>'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    
    <!-- 회수 사유 -->
    <div style="margin-bottom:20px;">
      <label style="display:block; font-size:13px; font-weight:500; margin-bottom:8px;">
        회수 사유 <span style="color:#b84545;">*필수</span>
      </label>
      <div style="display:flex; gap:12px; margin-bottom:12px;">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
          <input type="radio" name="returnReason" value="결석" checked>
          <span style="font-size:14px;">결석</span>
        </label>
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
          <input type="radio" name="returnReason" value="기타">
          <span style="font-size:14px;">기타</span>
        </label>
      </div>
      <textarea 
        id="returnMemo" 
        placeholder="기타 선택 시 메모 필수 입력" 
        rows="2" 
        style="width:100%; padding:8px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; font-family:inherit; display:none;"
      ></textarea>
    </div>
    
    <!-- 선택 요약 -->
    <div style="padding:12px; background:#f9fafb; border-radius:6px; margin-bottom:20px; font-size:14px;">
      <span id="returnSelectedCount">0명</span> 선택
    </div>
    
    <!-- 버튼 -->
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-ghost return-modal-cancel">취소</button>

    </div>
  `;

  document.body.appendChild(modal);
  
  // 전체 선택
  const selectAll = modalContent.querySelector('#returnSelectAll');
  const studentChecks = modalContent.querySelectorAll('.return-student-check:not([disabled])');
  const confirmBtn = modalContent.querySelector('.return-modal-confirm');
  const selectedCountSpan = modalContent.querySelector('#returnSelectedCount');
  const memoTextarea = modalContent.querySelector('#returnMemo');
  const reasonRadios = modalContent.querySelectorAll('input[name="returnReason"]');
  
  function updateSelectedCount() {
    const checked = Array.from(studentChecks).filter(cb => cb.checked);
    selectedCountSpan.textContent = `${checked.length}명`;
    confirmBtn.disabled = checked.length === 0;
  }
  
  if (selectAll) {
    selectAll.onclick = () => {
      studentChecks.forEach(cb => cb.checked = selectAll.checked);
      updateSelectedCount();
    };
  }
  
  studentChecks.forEach(cb => {
    cb.onchange = updateSelectedCount;
  });
  
  // 기타 선택 시 메모 표시
  reasonRadios.forEach(radio => {
    radio.onchange = () => {
      if (radio.value === '기타') {
        memoTextarea.style.display = 'block';
      } else {
        memoTextarea.style.display = 'none';
      }
    };
  });
  
  // 취소
  modalContent.querySelector('.return-modal-cancel').onclick = () => modal.remove();
  modal.onclick = (e) => {
    if (e.target === modal) modal.remove();
  };
  
  // 회수 확인
  confirmBtn.onclick = () => {
    const selectedStudents = Array.from(studentChecks)
      .filter(cb => cb.checked)
      .map(cb => cb.dataset.student);
    
    if (selectedStudents.length === 0) {
      alert('회수할 학생을 선택해주세요.');
      return;
    }
    
    const reason = Array.from(reasonRadios).find(r => r.checked)?.value || '결석';
    const memo = memoTextarea.value.trim();
    
    if (reason === '기타' && !memo) {
      alert('기타 선택 시 메모를 입력해주세요.');
      memoTextarea.focus();
      return;
    }
    
    // 최종 확인 모달
    showReturnConfirmModal(selectedStudents, classId, bookId, cls.className, book.name, reason, memo);
  };
}

// 회수 실행
function executeReturn(studentIds, bookId, reason, memo) {
  const td = getCurrentTargetData();
  const timestamp = Date.now();
  const currentUser = '이형빈'; // TODO: 실제 로그인 사용자
  
  studentIds.forEach(studentId => {
    // distributions에서 해당 배부 찾아서 상태 변경
    const dist = Object.values(td.distributions).find(d =>
      d.studentId === studentId &&
      d.bookId === bookId &&
      d.status === 'distributed'
    );
    
    if (dist) {
      dist.status = 'returned';
      dist.returnedAt = timestamp;
      dist.returnedBy = currentUser;
      dist.returnReason = reason;
      dist.returnMemo = memo;
    }
  });
  
  saveTargetData(td);
  renderMain(); // 필터 유지
  
  alert(`✅ ${studentIds.length}건 회수 완료되었습니다!`);
}

// 일괄 회수
function handleBulkReturn() {
  console.log('=== 일괄 회수 시작 ===');
  
  const td = getCurrentTargetData();
  
  // 체크된 반들 수집
  const checkedClassIds = Array.from(document.querySelectorAll('.check-class:checked'))
    .map(cb => cb.dataset.class);
  
  if (checkedClassIds.length === 0) {
    alert('회수할 반을 선택해주세요.');
    return;
  }
  
  // 체크된 교재들 수집
  const checkedBookIds = Array.from(document.querySelectorAll('.check-book:checked'))
    .map(cb => cb.dataset.book);
  
  console.log('체크된 반:', checkedClassIds);
  console.log('체크된 교재:', checkedBookIds);
  
  // 회수할 학생 수 계산 (배부된 학생만)
  const returnData = [];
  
  checkedClassIds.forEach(classId => {
    const cls = td.classes.find(c => c.id === classId);
    if (!cls || !cls.bookIds) return;
    
    const students = td.students.filter(s => s.classIds && s.classIds.includes(classId));
    
    // 체크된 교재만 또는 교재 체크 없으면 모든 교재
    const bookIdsToProcess = checkedBookIds.length > 0 
      ? cls.bookIds.filter(bid => checkedBookIds.includes(bid))
      : cls.bookIds;
    
    bookIdsToProcess.forEach(bookId => {
      students.forEach(student => {
        // 현재 배부 상태인 학생만
        const isDistributed = Object.values(td.distributions).some(d => 
          d.studentId === student.id && 
          d.bookId === bookId && 
          d.status === 'distributed'
        );
        
        if (isDistributed) {
          returnData.push({
            studentId: student.id,
            studentName: student.name,
            classId: classId,
            className: cls.className,
            bookId: bookId
          });
        }
      });
    });
  });
  
  if (returnData.length === 0) {
    alert('회수할 학생이 없습니다. (이미 모두 회수되었거나 배부되지 않음)');
    return;
  }
  
  console.log('회수 데이터:', returnData);
  
  // 모달 표시
  showBulkReturnModal(returnData);
}

      memoTextarea.focus();
      return;
    }
    
    // 버튼 비활성화 및 텍스트 변경
    confirmBtn.disabled = true;
    confirmBtn.textContent = '처리 중...';
    confirmBtn.style.opacity = '0.6';
    confirmBtn.style.cursor = 'not-allowed';
    
    // 회수 실행
    const studentIds = returnData.map(d => d.studentId);
    const bookId = returnData[0].bookId; // 일괄 회수는 같은 교재
    
    // 약간의 딜레이 후 실행 (버튼 변경 표시)
    setTimeout(() => {
      executeReturn(studentIds, bookId, reason, memo);
      modal.remove();
    }, 100);
  };
}

function renderStatusTable(td, classes) {

function renderStatusTableRow(c, allBooks, td) {
  const students = td.students.filter(s => s.classIds.includes(c.id));
  const classBooks = (c.bookIds || []).map(bid => td.books.find(b => b.id === bid)).filter(Boolean);
  
  if (students.length === 0) return '';
  
  // 각 교재별 배부 수
  const bookCounts = allBooks.map(book => {
    const isClassBook = classBooks.some(cb => cb.id === book.id);
    if (!isClassBook) return { book, count: 0, total: 0, na: true };
    
    let count = 0;
    students.forEach(s => {
      const distKey = s.id + '||' + book.id;
      const dist = td.distributions[distKey];
      if (dist && dist.status === 'distributed') count++;
    });
    
    return { book, count, total: students.length, na: false };
  });
  
  // 전체 진행률
  const validBooks = bookCounts.filter(bc => !bc.na);
  const totalCells = validBooks.reduce((sum, bc) => sum + bc.total, 0);
  const distributedCells = validBooks.reduce((sum, bc) => sum + bc.count, 0);
  const percent = totalCells > 0 ? Math.round((distributedCells / totalCells) * 100) : 0;
  const hasIssue = percent < 100;
  
  return `
    <tr class="status-row" 
        data-class-id="${c.id}"
        onclick="toggleStatusDetail('${c.id}')"
        style="border-bottom:1px solid var(--border-soft); cursor:pointer; transition:background 0.15s;"
        onmouseover="this.style.background='var(--bg-soft)'"
        onmouseout="this.style.background='white'">
      <td style="padding:12px; font-weight:500; border-right:1px solid var(--border-soft);">
        <span class="badge badge-subject">${escapeHtml(c.subject)}</span>
      </td>
      <td style="padding:12px; border-right:1px solid var(--border-soft);">
        ${c.teacher ? `<span class="badge badge-teacher">${escapeHtml(c.teacher)}</span>` : '-'}
      </td>
      <td style="padding:12px; font-weight:600; border-right:1px solid var(--border-soft);">${escapeHtml(c.className)}</td>
      <td style="padding:12px; text-align:center; font-weight:600; border-right:1px solid var(--border-soft);">${students.length}</td>
      ${bookCounts.map(bc => `
        <td style="padding:12px; text-align:center; font-weight:600; border-right:1px solid var(--border-soft); 
                   color:${bc.na ? 'var(--text-faint)' : bc.count === bc.total ? 'var(--accent-dark)' : '#B07A12'};">
          ${bc.na ? '-' : `${bc.count}/${bc.total}`}
        </td>
      `).join('')}
      <td style="padding:12px; text-align:center; font-weight:700; font-size:14px;
                 color:${hasIssue ? '#B07A12' : 'var(--accent-dark)'};">
        ${distributedCells}/${totalCells} ${hasIssue ? '⚠️' : '✅'}
      </td>
    </tr>
    <tr id="statusDetail_${c.id}" style="display:none;">
      <td colspan="${allBooks.length + 5}" style="padding:0; background:var(--bg-soft); border-bottom:2px solid var(--border);">
        <div style="padding:20px;">
          ${renderStatusDetail(c, classBooks, students, td)}
        </div>
      </td>
    </tr>
  `;
}

  `;
}

// 전역 함수들
window.toggleStatusDetail = function(classId) {
  const detailRow = document.getElementById(`statusDetail_${classId}`);
  if (!detailRow) return;
  const isVisible = detailRow.style.display !== 'none';
  detailRow.style.display = isVisible ? 'none' : 'table-row';
};

window.updateSelection = function(classId) {
  const checks = document.querySelectorAll(`.student-check-${classId}:checked`);
  const count = checks.length;
  
  const span = document.getElementById(`selected_${classId}`);
  if (span) span.textContent = count;
  
  const btn = document.getElementById(`returnBtn_${classId}`);
  if (btn) btn.disabled = count === 0;
};

window.returnSelected = function(classId) {
  const td = getCurrentTargetData();
  const cls = td.classes.find(c => c.id === classId);
  if (!cls) return;
  
  const checks = document.querySelectorAll(`.student-check-${classId}:checked`);
  if (checks.length === 0) return;
  
  const studentIds = Array.from(checks).map(ch => ch.dataset.studentId);
  const books = (cls.bookIds || []).map(bid => td.books.find(b => b.id === bid)).filter(Boolean);
  
  showModal({
    title: '선택 학생 전체 교재 회수',
    desc: `선택한 ${studentIds.length}명의 모든 교재(${books.length}종)를 회수할까요?`,
    confirmText: '회수',
    confirmStyle: 'danger',
    onConfirm: () => {
      let returnCount = 0;
      studentIds.forEach(studentId => {
        books.forEach(book => {
          const distKey = studentId + '||' + book.id;
          const dist = td.distributions[distKey];
          if (dist && dist.status === 'distributed') {
            if (!dist.history) dist.history = [];
            dist.history.push({
              type: 'return',
              at: new Date().toISOString(),
              author: state.currentUser,
              memo: '배부현황에서 일괄 회수',
              stockBefore: getCurrentStock(book, td),
              stockAfter: getCurrentStock(book, td) + 1
            });
            dist.status = 'undistributed';
            returnCount++;
          }
        });
      });
      
      saveData();
      renderMain();
      toast(`${returnCount}건 회수 완료`);
    }
  });
};

// ============================================================
// 배부 / 회수 (강사 단위)
