// 결제대기 숫자 업데이트
function updatePaymentBadge() {
  const paymentTab = document.getElementById('paymentTab');
  if (!paymentTab) return;
  
  const hasTarget = !!state.currentTargetId;
  if (!hasTarget) {
    paymentTab.textContent = '💰 결제대기';
    return;
  }
  
  const td = getCurrentTargetData();
  let count = 0;
  
  Object.entries(td.distributions).forEach(([key, dist]) => {
    if (!dist.history) return;
    dist.history.forEach(h => {
      if (h.type === 'additional_distribute' && h.paid === true && h.paymentCompleted !== true) {
        count++;
      }
    });
  });
  
  if (count > 0) {
    paymentTab.innerHTML = `💰 결제대기 <span style="background:var(--danger);color:white;padding:2px 6px;border-radius:10px;font-size:11px;margin-left:4px;">${count}</span>`;
  } else {
    paymentTab.textContent = '💰 결제대기';
  }
}

// 결제대기 목록
function renderPaymentWaiting(td) {
  // 전체 결제대기 수집
  const allPayments = [];
  Object.entries(td.distributions).forEach(([key, dist]) => {
    if (!dist.history) return;
    dist.history.forEach(h => {
      if (h.type === 'additional_distribute' && h.paid === true && h.paymentCompleted !== true) {
        const student = td.students.find(s => s.id === dist.studentId);
        const book = td.books.find(b => b.id === dist.bookId);
        if (student && book) {
          allPayments.push({
            studentId: dist.studentId,
            studentName: student.name,
            bookId: dist.bookId,
            bookName: book.name,
            at: h.at,
            author: h.author
          });
        }
      }
    });
  });
  
  // 날짜순 정렬 (최신 우선)
  allPayments.sort((a, b) => b.at.localeCompare(a.at));
  
  return `
    <div class="section">
      <div class="section-head">
        <div class="section-title-wrap">
          <div class="section-title">💰 결제대기</div>
          <div class="section-desc">추가배부(유료)로 교재를 받았지만 아직 결제가 완료되지 않은 목록입니다</div>
        </div>
      </div>
      
      ${allPayments.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-text">결제대기 건이 없습니다</div>
        </div>
      ` : `
        <div style="background:white; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
          <div style="display:grid; grid-template-columns:120px 1fr 1fr 150px 100px; gap:12px; padding:12px 16px; background:var(--bg-soft); font-size:12px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border);">
            <div>날짜</div>
            <div>학생</div>
            <div>교재</div>
            <div>처리자</div>
            <div>액션</div>
          </div>
          ${allPayments.map(p => {
            const date = new Date(p.at);
            const dateStr = date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
            return `
              <div style="display:grid; grid-template-columns:120px 1fr 1fr 150px 100px; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border-light); align-items:center;">
                <div style="font-size:13px; color:var(--text-dim);">${dateStr}</div>
                <div style="font-size:13px; font-weight:500;">${escapeHtml(p.studentName)}</div>
                <div style="font-size:13px;">${escapeHtml(p.bookName)}</div>
                <div style="font-size:12px; color:var(--text-dim);">${escapeHtml(p.author)}</div>
                <div>
                  <button class="btn btn-primary btn-sm" data-complete-payment="${p.studentId}" data-payment-book="${p.bookId}" data-payment-at="${p.at}" style="font-size:11px; padding:4px 10px;">
                    결제완료
                  </button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

// 학생 관리 탭에 들어가는 "조건 검색 + 결과 카드" 섹션
function renderSearchSection() {
  const td = getCurrentTargetData();
  if (td.classes.length === 0) {
    return `
      <div class="section">
        <div class="section-head">
          <div class="section-title-wrap">
            <div class="section-title">업로드 결과 확인</div>
            <div class="section-desc">엑셀 업로드나 개별 추가가 끝나면 여기에 결과가 나옵니다.</div>
          </div>
        </div>
        <div class="empty-state">
          <div class="empty-state-text">아직 등록된 반이 없습니다. 위에서 엑셀을 업로드하거나 반·학생을 추가해주세요.</div>
        </div>
      </div>
    `;
  }

  // 옵션 계산
  const subjects = [...new Set(td.classes.map(c => c.subject))].sort();
  const teacherOpts = [...new Set(
    td.classes
      .filter(c => !searchState.subject || c.subject === searchState.subject)
      .map(c => c.teacher || '(강사 미입력)')
  )].sort();
  const classOpts = td.classes
    .filter(c => !searchState.subject || c.subject === searchState.subject)
    .filter(c => !searchState.teacher || (c.teacher || '(강사 미입력)') === searchState.teacher);

  if (searchState.teacher && !teacherOpts.includes(searchState.teacher)) searchState.teacher = '';
  if (searchState.classId && !classOpts.some(c => c.id === searchState.classId)) searchState.classId = '';

  const resultClasses = classOpts
    .filter(c => !searchState.classId || c.id === searchState.classId)
    .sort((a, b) => {
      if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
      if ((a.teacher || '') !== (b.teacher || '')) return (a.teacher || '').localeCompare(b.teacher || '');
      return a.className.localeCompare(b.className);
    });

  const totalStudentsInResult = new Set(
    resultClasses.flatMap(c => td.students.filter(s => s.classIds.includes(c.id)).map(s => s.id))
  ).size;

  const autoExpand = resultClasses.length > 0 && resultClasses.length <= 5;
  const allExpanded = resultClasses.length > 0 && resultClasses.every(c => autoExpand || searchState.expanded.has(c.id));

  return `
    <div class="section">
      <div class="section-head">
        <div class="section-title-wrap">
          <div class="section-title">반별 학생 명단 (반 ${resultClasses.length}개 · 학생 ${totalStudentsInResult}명)</div>
          <div class="section-desc">필터로 좁히고, 반 헤더 클릭하면 펼침/접힘 · "편집" 버튼은 반 정보·소속 학생 수정 · 학생 이름 클릭하면 학생 편집</div>
        </div>
        <div style="display:flex; gap:6px;">
          ${resultClasses.length > 0 && !autoExpand ? `<button class="btn btn-secondary btn-sm" id="toggleAllBtn">${allExpanded ? '모두 접기' : '모두 펼치기'}</button>` : ''}
          ${resultClasses.length > 0 ? `<button class="btn btn-primary btn-sm" id="downloadResultsBtn">📥 엑셀 다운로드</button>` : ''}
          <button class="btn btn-ghost btn-sm" id="searchResetBtn">초기화</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">과목</label>
          <select class="col-match-select" id="searchSubjectSel" style="width:100%;">
            <option value="">전체 (${subjects.length}개 과목)</option>
            ${subjects.map(s => `<option value="${escapeHtml(s)}" ${searchState.subject === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">강사</label>
          <select class="col-match-select" id="searchTeacherSel" style="width:100%;">
            <option value="">전체 (${teacherOpts.length}명)</option>
            ${teacherOpts.map(t => `<option value="${escapeHtml(t)}" ${searchState.teacher === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600;">반</label>
          <select class="col-match-select" id="searchClassSel" style="width:100%;">
            <option value="">전체 (${classOpts.length}개)</option>
            ${classOpts.map(c => `<option value="${escapeHtml(c.id)}" ${searchState.classId === c.id ? 'selected' : ''}>${escapeHtml(c.className)}</option>`).join('')}
          </select>
        </div>
      </div>

      ${resultClasses.length === 0
        ? `<div class="empty-state"><div class="empty-state-text">조건에 맞는 반이 없습니다.</div></div>`
        : `<div style="display:grid; gap:8px;">${resultClasses.map(c => renderSearchClassCard(c, td, autoExpand)).join('')}</div>`
      }
    </div>
  `;
}

function renderSearchClassCard(c, td, autoExpand) {
  const students = td.students
    .filter(s => s.classIds.includes(c.id))
    .sort((a, b) => a.name.localeCompare(b.name));
  const expanded = autoExpand || searchState.expanded.has(c.id);

  return `
    <div class="search-class-card" style="border:1px solid var(--border); border-radius:10px; background: var(--bg-card); overflow:hidden;">
      <div class="search-class-head" data-toggle-class="${c.id}" style="display:flex; justify-content:space-between; align-items:center; padding: 12px 16px; cursor:pointer; user-select:none; ${expanded ? 'border-bottom:1px solid var(--border);' : ''}">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex:1;">
          <span class="badge badge-subject">${escapeHtml(c.subject)}</span>
          ${c.teacher ? `<span class="badge badge-teacher">${escapeHtml(c.teacher)}</span>` : '<span style="color:var(--text-faint);font-size:11px;">강사 미입력</span>'}
          <span style="font-weight:600; font-size:14px;">${escapeHtml(c.className)}</span>
          <span style="color:var(--text-dim); font-size:12.5px;">${students.length}명</span>
        </div>
        <div style="display:flex; gap:6px; align-items:center;">
          <button class="btn btn-ghost btn-sm" data-edit-class="${c.id}" title="반 편집">편집</button>
          <button class="btn btn-ghost btn-sm" data-download-class-id="${c.id}" title="이 반 명단 다운로드">📥</button>
          <span style="font-size:12px; color:var(--text-dim); min-width:14px; text-align:center;">${expanded ? '▲' : '▼'}</span>
        </div>
      </div>
      ${expanded ? `
        <div style="padding: 10px 16px 14px;">
          ${students.length === 0
            ? '<div style="text-align:center;padding:18px;color:var(--text-faint);font-size:12.5px;">학생 없음</div>'
            : (() => {
                // 학생별 배부 상태 계산
                const studentStats = students.map(s => {
                  const classBooks = new Set();
                  (s.classIds || []).forEach(classId => {
                    const cls = td.classes.find(c => c.id === classId);
                    if (cls && cls.bookIds) {
                      cls.bookIds.forEach(bookId => classBooks.add(bookId));
                    }
                  });
                  
                  let distributed = 0;
                  const undistributedBooks = [];
                  
                  classBooks.forEach(bookId => {
                    const book = td.books.find(b => b.id === bookId);
                    if (!book) return;
                    
                    const distKey = `${s.id}_${bookId}`;
                    const isDistributed = td.distributions && 
                                        td.distributions[distKey] && 
                                        td.distributions[distKey].status === 'distributed';
                    
                    const additionalDist = (td.additionalDistributions || []).some(d => 
                      d.bookId === bookId && d.studentName === s.name
                    );
                    
                    if (isDistributed || additionalDist) {
                      distributed++;
                    } else {
                      undistributedBooks.push(book.title);
                    }
                  });
                  
                  const total = classBooks.size;
                  const isComplete = total > 0 && distributed === total;
                  const pending = undistributedBooks.length;
                  
                  return { student: s, distributed, total, isComplete, pending, undistributedBooks };
                });
                
                const displayLimit = 10;
                const displayStudents = studentStats.slice(0, displayLimit);
                const hasMore = students.length > displayLimit;
                
                return `
                  <div style="display: flex; flex-direction: column; gap: 6px;">
                    ${displayStudents.map(({ student, distributed, total, isComplete, pending, undistributedBooks }) => `
                      <div style="display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; background: var(--bg-soft); font-size: 13px;">
                        <span style="font-size: 16px;">${isComplete ? '✅' : pending > 0 ? '⏳' : total === 0 ? '➖' : '❌'}</span>
                        <span class="student-link" data-edit-student="${student.id}" 
                          style="flex: 1; cursor: pointer; font-weight: 500; color: var(--text);" 
                          title="클릭하면 학생 편집">${escapeHtml(student.name)}</span>
                        <span style="color: var(--text-dim); font-size: 12px; min-width: 45px; text-align: right;">
                          ${total > 0 ? `📚 ${distributed}/${total}` : '-'}
                        </span>
                        ${pending > 0 ? `
                          <span style="color: var(--danger); font-size: 11px; min-width: 80px; text-align: right;" title="${undistributedBooks.join(', ')}">
                            ${pending}개 미배부
                          </span>
                        ` : `
                          <span style="color: var(--success); font-size: 11px; min-width: 80px; text-align: right;">
                            배부완료
                          </span>
                        `}
                      </div>
                    `).join('')}
                    ${hasMore ? `
                      <div style="text-align: center; padding: 8px; color: var(--text-dim); font-size: 12px; cursor: pointer; border-radius: 6px; background: var(--bg-hover);" 
                        onclick="alert('반별 명단 탭에서 전체 학생을 확인하세요')">
                        + ${students.length - displayLimit}명 더보기
                      </div>
                    ` : ''}
                  </div>
                `;
              })()
          }
        </div>
      ` : ''}
    </div>
  `;
}

// 학생에게 교재 배부
function distributeToStudent(studentId, bookId) {
  const td = getCurrentTargetData();
  const student = td.students.find(s => s.id === studentId);
  const book = td.books.find(b => b.id === bookId);
  if (!student || !book) return;
  
  const distKey = studentId + '||' + bookId;
  const now = new Date().toISOString();
  
  if (!td.distributions[distKey]) {
    td.distributions[distKey] = {
      studentId,
      bookId,
      status: 'distributed',
      at: now,
      author: state.currentUser,
      history: []
    };
  } else {
    td.distributions[distKey].status = 'distributed';
    td.distributions[distKey].at = now;
    td.distributions[distKey].author = state.currentUser;
  }
  
  td.distributions[distKey].history.push({
    type: 'distribute',
    at: now,
    author: state.currentUser
  });
  
  saveData();
  renderMain();
  toast(`${book.name} 배부 완료`);
}

// 학생으로부터 교재 회수
function returnFromStudent(studentId, bookId) {
  const td = getCurrentTargetData();
  const student = td.students.find(s => s.id === studentId);
  const book = td.books.find(b => b.id === bookId);
  if (!student || !book) {
    toast('학생 또는 교재를 찾을 수 없습니다', true);
    return;
  }
  
  const distKey = studentId + '||' + bookId;
  if (!td.distributions[distKey]) {
    toast('배부 이력이 없습니다', true);
    return;
  }
  
  // 메모 입력 모달
  const html = `
    <div class="modal">
      <div class="modal-title">↩️ 회수</div>
      <div class="modal-desc">
        <b>${escapeHtml(student.name)}</b> 학생에게서<br>
        <b>${escapeHtml(book.name)}</b> 회수
      </div>
      
      <div style="margin:16px 0;">
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;">회수 사유 <span style="color:var(--danger);">* 필수</span></label>
        <textarea id="returnMemo" class="modal-input" placeholder="예: 학기 종료, 교재 교체, 분실 재구매 등" rows="2"></textarea>
      </div>
      
      <div class="modal-error" id="returnError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="returnCancel">취소</button>
        <button class="btn btn-primary" id="returnConfirm">회수</button>
      </div>
    </div>
  `;
  
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  
  bd.querySelector('#returnCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  
  bd.querySelector('#returnConfirm').onclick = () => {
    const memo = bd.querySelector('#returnMemo').value.trim();
    const errorEl = bd.querySelector('#returnError');
    
    if (!memo) {
      errorEl.textContent = '회수 사유를 입력하세요';
      return;
    }
    
    const now = new Date().toISOString();
    
    // 재고 변화 계산
    const stockBefore = getCurrentStock(book, td);
    const stockAfter = stockBefore + 1;
    
    td.distributions[distKey].status = 'returned';
    td.distributions[distKey].at = now;
    td.distributions[distKey].author = state.currentUser;
    
    td.distributions[distKey].history.push({
      type: 'return',
      at: now,
      author: state.currentUser,
      memo: memo,
      stockBefore,
      stockAfter
    });
    
    saveData();
    bd.remove();
    renderMain();
    toast(`${book.name} 회수 완료`);
  };
  
  setTimeout(() => bd.querySelector('#returnMemo').focus(), 100);
}

// 추가 배부 모달
function showAdditionalDistributeModal(studentId, bookId) {
  const td = getCurrentTargetData();
  const book = td.books.find(b => b.id === bookId);
  const student = td.students.find(s => s.id === studentId);

    return;
  }

  const html = `
    <div class="modal">
      <div class="modal-title">📦 추가 배부</div>
      <div class="modal-desc">
        <b>${escapeHtml(student.name)}</b> 학생에게<br>
        <b>${escapeHtml(book.name)}</b> 추가 배부
      </div>
      
      <div style="margin:16px 0;">
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:8px;">배부 유형</label>
        <label style="display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--border); border-radius:6px; margin-bottom:8px; cursor:pointer;">
          <input type="radio" name="addDistType" value="paid" checked>
          <span>💰 유료 (교재비 받음)</span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--border); border-radius:6px; cursor:pointer;">
          <input type="radio" name="addDistType" value="free">
          <span>🆓 무료 (직원 판단)</span>
        </label>
      </div>
      
      <div style="margin:16px 0;">
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;">메모 (선택)</label>
        <textarea id="addDistMemo" class="modal-input" placeholder="예: 분실로 인한 재구매, 반 이동으로 맞교환" rows="2"></textarea>
      </div>
      
      <div class="modal-error" id="addDistError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="addDistCancel">취소</button>
        <button class="btn btn-primary" id="addDistConfirm">추가 배부</button>
      </div>
    </div>
  `;
  
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  
  bd.querySelector('#addDistCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  
  bd.querySelector('#addDistConfirm').onclick = () => {
    const type = bd.querySelector('input[name="addDistType"]:checked').value;
    const memo = bd.querySelector('#addDistMemo').value.trim();
    
    const distKey = studentId + '||' + bookId;
    const now = new Date().toISOString();
    
    // 재고 변화 계산
    const book = td.books.find(b => b.id === bookId);
    const stockBefore = book ? getCurrentStock(book, td) : 0;
    const stockAfter = stockBefore - 1;
    
    // 추가 배부 이력 기록
    if (!td.distributions[distKey].history) td.distributions[distKey].history = [];
    td.distributions[distKey].history.push({
      type: 'additional_distribute',
      at: now,
      author: state.currentUser,
      memo: memo || '',
      paid: type === 'paid',
      stockBefore,
      stockAfter
    });
    
    saveData();
    bd.remove();
    renderMain();
    toast(`추가 배부 완료 (${type === 'paid' ? '유료' : '무료'})`);
  };
}

function cancelHistory(studentId, bookId, historyAt) {
  const td = getCurrentTargetData();
  const distKey = studentId + '||' + bookId;
  const dist = td.distributions[distKey];
  
  if (!dist || !dist.history) {
    toast('이력을 찾을 수 없습니다', true);
    return;
  }
  
  // 취소할 이력 찾기
  const historyIndex = dist.history.findIndex(h => h.at === historyAt);
  if (historyIndex === -1) {
    toast('이력을 찾을 수 없습니다', true);
    return;
  }
  
  const historyItem = dist.history[historyIndex];
  const book = td.books.find(b => b.id === bookId);
  const student = td.students.find(s => s.id === studentId);
  
  showConfirm({
    title: '이력 취소',
    message: `${historyItem.type === 'distribute' ? '배부' : historyItem.type === 'return' ? '회수' : '추가배부'} 이력을 취소하시겠습니까?\n\n학생: ${student?.name || '알 수 없음'}\n교재: ${book?.name || '알 수 없음'}\n\n취소 시 이전 상태로 복원됩니다.`,
    confirmText: '취소하기',
    cancelText: '닫기',
    onConfirm: () => {
      // 이력 삭제가 아니라 취소 표시!
      historyItem.cancelled = true;
      historyItem.cancelledAt = new Date().toISOString();
      historyItem.cancelledBy = state.currentUser;
      
      // 상태 업데이트: 취소되지 않은 마지막 이력으로
      const activeHistory = dist.history.filter(h => !h.cancelled);
      if (activeHistory.length === 0) {
        dist.status = 'none';
        dist.at = '';
        dist.author = '';
      } else {
        const lastActive = activeHistory[activeHistory.length - 1];
        if (lastActive.type === 'distribute' || lastActive.type === 'additional_distribute') {
          dist.status = 'distributed';
        } else if (lastActive.type === 'return') {
          dist.status = 'returned';
        }
        dist.at = lastActive.at;
        dist.author = lastActive.author;
      }
      
      saveData();
      renderMain();
      toast('이력이 취소되었습니다');
    }
  });
}

function addStaffMemo(studentId) {
  const td = getCurrentTargetData();
  const student = td.students.find(s => s.id === studentId);
  if (!student) {
    toast('학생을 찾을 수 없습니다', true);
    return;
  }
  
  const html = `
    <div class="modal">
      <div class="modal-title">📌 직원 메모</div>
      <div class="modal-desc">
        <b>${escapeHtml(student.name)}</b> 학생에 대한 메모를 남깁니다
      </div>
      
      <div style="margin:16px 0;">
        <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;">메모 내용 <span style="color:var(--danger);">*</span></label>
        <textarea id="staffMemoContent" class="modal-input" placeholder="예: 국어 교재 분실 확인됨. 재구매 안내 완료" rows="3"></textarea>
      </div>
      
      <div class="modal-error" id="staffMemoError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="staffMemoCancel">취소</button>
        <button class="btn btn-primary" id="staffMemoConfirm">저장</button>
      </div>
    </div>
  `;
  
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  
  bd.querySelector('#staffMemoCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  
  bd.querySelector('#staffMemoConfirm').onclick = () => {
    const memo = bd.querySelector('#staffMemoContent').value.trim();
    const errorEl = bd.querySelector('#staffMemoError');
    
    if (!memo) {
      errorEl.textContent = '메모 내용을 입력하세요';
      return;
    }
    
    // 학생의 첫 번째 교재를 선택 (임의)
    const studentClasses = td.classes.filter(c => student.classIds.includes(c.id));
    const allBookIds = new Set();
    studentClasses.forEach(c => {
      if (c.bookIds) c.bookIds.forEach(bid => allBookIds.add(bid));
    });
    const firstBookId = Array.from(allBookIds)[0];
    
    if (!firstBookId) {
      // 교재가 없으면 학생 전체 이력에 저장 (별도 구조 필요)
      // 임시로 첫 번째 교재에 강제로 distributions 생성
      toast('학생에게 매칭된 교재가 없습니다', true);
      return;
    }
    
    const distKey = studentId + '||' + firstBookId;
    if (!td.distributions[distKey]) {
      td.distributions[distKey] = { studentId, bookId: firstBookId, status: 'none', history: [] };
    }
    
    const now = new Date().toISOString();
    td.distributions[distKey].history.push({
      type: 'staff_memo',
      at: now,
      author: state.currentUser,
      memo: memo,
      bookId: null,
      bookName: null
    });
    
    saveData();
    bd.remove();
    renderMain();
    toast('메모가 저장되었습니다');
  };
  
  setTimeout(() => bd.querySelector('#staffMemoContent').focus(), 100);
}

function showAllHistoryModal(studentId) {
  const td = getCurrentTargetData();
  const student = td.students.find(s => s.id === studentId);
  if (!student) {
    toast('학생을 찾을 수 없습니다', true);
    return;
  }
  
  // 학생의 모든 교재 ID 수집
  const studentClasses = td.classes.filter(c => student.classIds.includes(c.id));
  const allBookIds = new Set();
  studentClasses.forEach(c => {
    if (c.bookIds) c.bookIds.forEach(bid => allBookIds.add(bid));
  });
  
  // 모든 이력 수집
  const allHistory = [];
  Array.from(allBookIds).forEach(bookId => {
    const book = td.books.find(b => b.id === bookId);
    if (!book) return;
    
    const distKey = student.id + '||' + bookId;
    const dist = td.distributions[distKey];
    
    if (dist && dist.history && dist.history.length > 0) {
      dist.history.forEach(h => {
        allHistory.push({
          ...h,
          bookId: bookId,
          bookName: book.name,
          studentId: student.id
        });
      });
    }
  });
  
  // 시간순 정렬 (최신 우선)
  allHistory.sort((a, b) => b.at.localeCompare(a.at));
  
  const html = `
    <div class="modal modal-xl">
      <div class="modal-title">📋 전체 이력 - ${escapeHtml(student.name)}</div>
      <div class="modal-desc">총 ${allHistory.length}건의 이력</div>
      
      ${allHistory.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-text">이력이 없습니다</div>
        </div>
      ` : `
        <div style="max-height:500px; overflow-y:auto; margin:16px 0;">
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${allHistory.map(h => {
              const date = new Date(h.at);
              const dateStr = date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
              const timeStr = date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
              
              let typeInfo = {};
              if (h.type === 'distribute') {
                typeInfo = { icon: '📦', label: '배부', color: '#378ADD', bgColor: '#E6F1FB' };
              } else if (h.type === 'return') {
                typeInfo = { icon: '↩️', label: '회수', color: '#BA7517', bgColor: '#FAEEDA' };
              } else if (h.type === 'additional_distribute') {
                typeInfo = { icon: '📦', label: '추가배부', color: '#1D9E75', bgColor: '#E1F5EE' };
              }
              
              const stockInfo = (h.stockBefore !== undefined && h.stockAfter !== undefined) 
                ? `<span style="font-size:11px; color:var(--text-dim); ${h.cancelled ? 'text-decoration:line-through; opacity:0.6;' : ''}">재고 ${h.stockBefore} → ${h.stockAfter}</span>`
                : '';
              
              const memoDisplay = h.memo 
                ? `<div style="font-size:12px; color:var(--text-dim); margin-top:4px; padding:6px; background:var(--bg); border-radius:4px;">💬 ${escapeHtml(h.memo)}</div>`
                : '';
              
              const paidBadge = h.paid !== undefined 
                ? (h.paid 
                    ? `<span style="background:#FAECE7; color:#993C1D; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600;">💰 유료</span>`
                    : `<span style="background:#EAF3DE; color:#3B6D11; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600;">🆓 무료</span>`)
                : '';
              
              return `
                <div style="padding:12px; background:var(--bg-soft); border-radius:8px; border-left:3px solid ${typeInfo.color};">
                  <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap;">
                    <span style="display:inline-flex; align-items:center; gap:4px; background:${typeInfo.bgColor}; color:${typeInfo.color}; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600;">
                      ${typeInfo.icon} ${typeInfo.label}
                    </span>
                    ${paidBadge}
                    <span style="font-size:11px; color:var(--text-faint);">${dateStr} ${timeStr}</span>
                    <span style="font-size:11px; color:var(--text-secondary);">작성자: ${escapeHtml(h.author)}</span>
                  </div>
                  <div style="font-size:13px; color:var(--text); margin-bottom:4px; font-weight:500;">${escapeHtml(h.bookName)}</div>
                  ${stockInfo}
                  ${memoDisplay}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `}
      
      <div class="modal-actions">
        <button class="btn btn-primary" id="closeHistoryModal">닫기</button>
      </div>
    </div>
  `;
  
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  
  bd.querySelector('#closeHistoryModal').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
}

function attachSearchPageEvents() {
  // 학생 선택
  const studentSelect = document.getElementById('studentSelect');
  if (studentSelect) {
    studentSelect.onchange = (e) => {
      selectedStudentId = e.target.value || null;
      studentSearchFilter = { subject: '', teacher: '', classId: '', status: '', query: '' };
      renderMain();
    };
  }
  
  // 필터
  const ssfSubject = document.getElementById('ssfSubject');
  if (ssfSubject) {
    ssfSubject.onchange = (e) => {
      studentSearchFilter.subject = e.target.value;
      studentSearchFilter.teacher = '';
      studentSearchFilter.classId = '';
      renderMain();
    };
  }
  
  const ssfTeacher = document.getElementById('ssfTeacher');
  if (ssfTeacher) {
    ssfTeacher.onchange = (e) => {
      studentSearchFilter.teacher = e.target.value;
      studentSearchFilter.classId = '';
      renderMain();
    };
  }
  
  const ssfClass = document.getElementById('ssfClass');
  if (ssfClass) {
    ssfClass.onchange = (e) => {
      studentSearchFilter.classId = e.target.value;
      renderMain();
    };
  }
  
  const ssfStatus = document.getElementById('ssfStatus');
  if (ssfStatus) {
    ssfStatus.onchange = (e) => {
      studentSearchFilter.status = e.target.value;
      renderMain();
    };
  }
  
  const ssfQuery = document.getElementById('ssfQuery');
  if (ssfQuery) {
    let composing = false;
    ssfQuery.addEventListener('compositionstart', () => { composing = true; });

function downloadSearchResults() {
  const td = getCurrentTargetData();
  const targetName = state.targets.find(t => t.id === state.currentTargetId)?.name || '대상';

  const resultClasses = td.classes
    .filter(c => !searchState.subject || c.subject === searchState.subject)
    .filter(c => !searchState.teacher || (c.teacher || '(강사 미입력)') === searchState.teacher)
    .filter(c => !searchState.classId || c.id === searchState.classId)
    .sort((a, b) => {
      if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
      if ((a.teacher || '') !== (b.teacher || '')) return (a.teacher || '').localeCompare(b.teacher || '');
      return a.className.localeCompare(b.className);
    });

  if (resultClasses.length === 0) {
    toast('다운로드할 결과가 없습니다', true);
    return;
  }

  const rows = [];
  rows.push([`bookang 검색 결과`]);
  rows.push([`대상: ${targetName}`]);
  rows.push([`다운로드 일시: ${new Date().toLocaleString('ko-KR')}`]);
  rows.push([`필터: 과목=${searchState.subject || '전체'} / 강사=${searchState.teacher || '전체'} / 반=${searchState.classId ? (td.classes.find(c=>c.id===searchState.classId)?.className || '') : '전체'}`]);
  rows.push([]);

  resultClasses.forEach((c, idx) => {
    if (idx > 0) rows.push([]);
    rows.push([`■ ${c.subject} · ${c.teacher || '(강사 미입력)'} · ${c.className}`]);
    rows.push(['번호', '학생명']);
    const students = td.students
      .filter(s => s.classIds.includes(c.id))
      .sort((a, b) => a.name.localeCompare(b.name));
    students.forEach((s, i) => rows.push([i + 1, s.name]));
    rows.push([`소계: ${students.length}명`]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 10 }, { wch: 40 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '검색결과');

  const filename = `bookang_${targetName}_검색결과_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast(`${resultClasses.length}개 반 다운로드됨`);
}

function downloadSingleClass(classId) {
  const td = getCurrentTargetData();
  const c = td.classes.find(x => x.id === classId);
  if (!c) return;
  const targetName = state.targets.find(t => t.id === state.currentTargetId)?.name || '대상';

  const students = td.students
    .filter(s => s.classIds.includes(classId))
    .sort((a, b) => a.name.localeCompare(b.name));

  const rows = [
    [`${c.subject} · ${c.teacher || '(강사 미입력)'} · ${c.className}`],
    [`대상: ${targetName}`],
    [`다운로드 일시: ${new Date().toLocaleString('ko-KR')}`],
    [],
    ['번호', '학생명'],
    ...students.map((s, i) => [i + 1, s.name]),
    [],
    [`총 ${students.length}명`]
  ];

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 10 }, { wch: 40 }];

  const wb = XLSX.utils.book_new();
  // 시트명에 사용 못 하는 문자 제거
  const sheetName = `${c.subject}_${c.className}`.replace(/[\\\/\*\?\[\]:]/g, '_').substring(0, 30);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  const safeFilename = `bookang_${c.subject}_${c.className}_${new Date().toISOString().slice(0,10)}.xlsx`
    .replace(/[\\\/\*\?\[\]:]/g, '_');
  XLSX.writeFile(wb, safeFilename);
  toast(`${c.className} 명단 다운로드됨`);
}

function updateUploadButtonStates() {
  const td = getCurrentTargetData();
  if (!td) return;
  
  const downloadStep2Btn = document.getElementById('downloadStep2Btn');
  const upload2Btn = document.getElementById('upload2Btn');
  
  // 1단계 완료 여부 확인 (반이 1개 이상 있으면 완료)
  const step1Complete = td.classes && td.classes.length > 0;
  
  if (step1Complete) {
    // 1단계 완료 → 2단계 버튼 활성화
    if (downloadStep2Btn) {
      downloadStep2Btn.disabled = false;
      downloadStep2Btn.classList.remove('btn-disabled');
      downloadStep2Btn.title = '';
    }
    if (upload2Btn) {
      upload2Btn.disabled = false;
      upload2Btn.classList.remove('btn-disabled');
      upload2Btn.title = '';
    }
  } else {
    // 1단계 미완료 → 2단계 버튼 비활성화
    if (downloadStep2Btn) {
      downloadStep2Btn.disabled = true;
      downloadStep2Btn.classList.add('btn-disabled');
      downloadStep2Btn.title = '⚠️ 1단계를 먼저 완료해주세요';
    }
    if (upload2Btn) {
      upload2Btn.disabled = true;
      upload2Btn.classList.add('btn-disabled');
      upload2Btn.title = '⚠️ 1단계를 먼저 완료해주세요';
    }
  }
}

    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    studentSearchQuery = '';
    classSearchQuery = '';
    pendingStockIn = {};
    pendingDist = {};
    renderMain();
  };
});

document.getElementById('currentTargetSelect').onchange = (e) => {
  state.currentTargetId = e.target.value || null;
  saveData();
  studentSearchQuery = '';
  classSearchQuery = '';
  render();
};

document.getElementById('currentUserBtn').onclick = changeCurrentUser;
document.getElementById('settingsBtn').onclick = showSettingsModal;

// localStorage 사용 불가 시 경고
if (!storageAvailable) {
  setTimeout(() => {
    toast('⚠️ file:// 프로토콜에서는 데이터가 저장되지 않습니다. 로컬 서버를 사용하세요.', true);
  }, 500);
}

// ============================================
// 테스트 데이터 생성 함수
// ============================================
function generateTestData() {
  // 대상이 없으면 자동 생성
  if (!state.currentTargetId || state.targets.length === 0) {
    const targetId = 'target_' + Date.now();
    const newTarget = {
      id: targetId,
      name: '테스트 대상',
      createdAt: Date.now(),
      classes: [],
      students: [],
      books: [],
      distributions: {}
    };
    state.targets.push(newTarget);
    state.currentTargetId = targetId;
    saveData();
    render(); // 헤더 업데이트
  }
  
  const td = getCurrentTargetData();
  
  if (!td) {
    alert('대상 생성에 실패했습니다.');
    return;
  }
  
  if (!confirm('테스트 데이터를 생성합니다.\n\n과목: 수학\n강사: 전종현, 김영희\n반: 6개 (각 30명)\n총 180명\n\n진행하시겠습니까?')) {
    return;
  }
  
  // 교재 확인 (없으면 생성)
  const bookNames = ['인사이트', '3점 특강', '수학통계', '기하학'];
  const bookIds = [];
  
  bookNames.forEach(name => {
    let book = td.books.find(b => b.name === name);
    if (!book) {
      book = {
        id: 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        name: name,
        subject: '수학',
        price: 25000,
        stockIn: 200,
        createdAt: Date.now()
      };
      td.books.push(book);
    }
    bookIds.push(book.id);
  });
  
  // 강사 및 반 생성
  const teachers = [
    { name: '전종현', classes: ['301', '302', '303'] },
    { name: '김영희', classes: ['304', '305', '306'] }
  ];
  
  teachers.forEach(teacher => {
    teacher.classes.forEach(className => {
      // 반 생성
      const classId = 'class_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      const cls = {
        id: classId,
        className: className,
        subject: '수학',
        teacher: teacher.name,
        bookIds: [...bookIds],
        createdAt: Date.now()
      };
      td.classes.push(cls);
      
      // 학생 30명 생성
      for (let i = 1; i <= 30; i++) {
        const studentId = 'student_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const student = {
          id: studentId,
          name: `학생${className}_${i}`,
          classIds: [classId],
          phone: '010-0000-' + String(i).padStart(4, '0'),
          createdAt: Date.now()
        };
        td.students.push(student);
        
        // 교재 배부 (일부만 배부 - 현실적)
        // 70% 학생만 배부
        if (Math.random() < 0.7) {
          bookIds.forEach(bookId => {
            const distId = 'dist_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            td.distributions[distId] = {
              id: distId,
              studentId: studentId,
              bookId: bookId,
              status: 'distributed',
              distributedAt: Date.now() - Math.floor(Math.random() * 30) * 24 * 60 * 60 * 1000, // 최근 30일
              distributedBy: '이형빈'
            };
          });
        }
      }
    });
  });
  
  saveTargetData(td);
  alert('✅ 테스트 데이터 생성 완료!\n\n강사 2명, 반 6개, 학생 180명');
  renderMain();
}

render();
</script>
