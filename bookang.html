<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF7;
    --bg-card: #FFFFFF;
    --bg-hover: #F2F0EA;
    --bg-soft: #F5F3ED;
    --text: #1A1A1A;
    --text-dim: #6B6B6B;
    --text-faint: #9A9A9A;
    --border: #E8E5DE;
    --border-strong: #D4D0C5;
    --accent: #2D5F4E;
    --accent-light: #E8F0EC;
    --accent-dark: #1F4438;
    --danger: #B84545;
    --danger-light: #FCEEEE;
    --warning: #C77D2E;
    --warning-light: #FFF7E6;
  }

  html, body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    height: 100%;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
  .logo span { color: var(--accent); }
  .logo small { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-left: 8px; }
  .current-target { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .current-target-label { color: var(--text-dim); }
  .current-target-select {
    background: var(--bg);
    border: 1px solid var(--border-strong);
    padding: 7px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    min-width: 180px;
  }
  .current-target-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .current-user {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    margin-left: 12px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
  }
  .current-user:hover { background: var(--accent-light); }

  .settings-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    margin-left: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .settings-btn:hover {
    background: var(--accent-light);
    transform: rotate(45deg);
  }

  .app { display: flex; flex: 1; min-height: 0; }

  nav.sidebar {
    width: 200px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    flex-shrink: 0;
  }
  .nav-item {
    display: block;
    padding: 11px 14px;
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }

  main { flex: 1; padding: 28px 36px; overflow: auto; }
  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .page-subtitle { color: var(--text-dim); font-size: 13px; }

  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 16px;
  }

  /* 같은 묶음의 섹션들은 좁은 간격 */
  .section-group {
    margin-bottom: 32px;
  }
  .section-group .section {
    margin-bottom: 8px;
  }
  .section-group .section:last-child {
    margin-bottom: 0;
  }
  .section-group-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
    padding-left: 4px;
  }
  .section-group-title small {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
  }
  .section-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .section-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .section-title-wrap { flex: 1; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.12s, border 0.12s, color 0.12s;
    background: none;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { background: var(--border-strong); cursor: not-allowed; }
  .btn-secondary { background: var(--bg-card); color: var(--text); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-ghost { color: var(--text-dim); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-light); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  .target-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .target-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: border 0.12s, background 0.12s;
    cursor: pointer;
  }
  .target-card:hover { border-color: var(--border-strong); }
  .target-card.is-current {
    background: var(--accent-light);
    border-color: var(--accent);
    cursor: default;
  }
  .target-card-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; }
  .target-name {
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .target-badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--accent);
    color: white;
    flex-shrink: 0;
  }
  .target-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-state-text { font-size: 13px; margin-bottom: 18px; line-height: 1.6; }

  /* ===== Modal ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 20, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.15s;
    padding: 20px;
  }
  @keyframes fadeIn { from { opacity: 0; } }
  .modal {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }
  .modal-lg { max-width: 720px; }
  .modal-xl { max-width: 960px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-desc { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; line-height: 1.6; }
  .modal-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .modal-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  .modal-hint { font-size: 12px; color: var(--text-faint); margin-bottom: 18px; }
  .modal-error { font-size: 12px; color: var(--danger); margin-bottom: 14px; min-height: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-warning {
    background: var(--danger-light);
    border-left: 3px solid var(--danger);
    padding: 12px 14px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #7a2a2a;
  }

  /* ===== Upload Wizard ===== */
  .wizard-steps {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .wizard-step {
    flex: 1;
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--bg-soft);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .wizard-step.active { background: var(--accent); color: white; }
  .wizard-step.done { background: var(--accent-light); color: var(--accent-dark); }

  .col-match-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .col-match-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg-soft);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .col-match-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .col-match-table tr:last-child td { border-bottom: none; }
  .col-match-select {
    padding: 6px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-card);
    min-width: 140px;
  }
  .col-match-input {
    padding: 6px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-card);
    width: 100px;
  }
  .col-preview {
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'SF Mono', Monaco, monospace;
    background: var(--bg-soft);
    padding: 4px 8px;
    border-radius: 4px;
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: inline-block;
  }

  .teacher-assign-list {
    max-height: 480px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .teacher-assign-row {
    display: grid;
    grid-template-columns: 90px 1fr 200px;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 13px;
  }
  .teacher-assign-row:last-child { border-bottom: none; }
  .teacher-assign-row.is-filled { background: var(--accent-light); }
  .teacher-assign-row.is-empty { background: var(--warning-light); }
  .subject-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--bg-soft);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .teacher-input {
    padding: 6px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-card);
    width: 100%;
  }
  .teacher-input:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: transparent;
  }
  .teacher-input.is-suggested {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  /* ===== Result Table ===== */
  .result-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--bg-soft);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  .data-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .data-table tbody tr:hover { background: var(--bg-soft); }

  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: auto;
    max-height: 560px;
  }

  .search-input {
    padding: 9px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-family: inherit;
    font-size: 13px;
    width: 260px;
  }
  .search-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 600;
    background: var(--bg-soft);
    color: var(--text-dim);
    margin-right: 4px;
  }
  .badge-subject { background: var(--accent-light); color: var(--accent-dark); }
  .badge-teacher { background: #EEEAF6; color: #4A3D7A; }

  .notice {
    background: var(--warning-light);
    border: 1px solid #F2D89A;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #7A5A12;
    margin-bottom: 16px;
  }
  .notice-info {
    background: var(--accent-light);
    border-color: #A8C9BB;
    color: var(--accent-dark);
  }

  .placeholder-section {
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
  }
  .placeholder-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .placeholder-text { font-size: 12.5px; line-height: 1.6; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg-card);
    padding: 11px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 200;
    animation: slideUp 0.2s;
    max-width: 420px;
  }
  @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } }
  .toast.is-error { background: var(--danger); }

  footer {
    padding: 12px 32px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-faint);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
  }

  .student-link {
    transition: background 0.12s;
  }
  .student-link:hover {
    background: var(--accent-light);
    color: var(--accent-dark);
    text-decoration: underline;
  }

  /* 필터 칩 토글 */
  .filter-chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .filter-chip-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    margin-right: 4px;
    min-width: 36px;
  }
  .filter-chip {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 14px;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
    white-space: nowrap;
  }
  .filter-chip:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .filter-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-chip.chip-warning.active {
    background: #B07A12;
    border-color: #B07A12;
  }
  .filter-chip.chip-success.active {
    background: var(--accent-dark);
    border-color: var(--accent-dark);
  }
  .stat-inline {
    display: inline-flex;
    gap: 12px;
    margin-left: 12px;
    font-size: 12.5px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .stat-inline b {
    color: var(--text);
    font-weight: 700;
    margin-left: 3px;
  }
  .stat-inline .stat-warn b {
    color: #B07A12;
  }

  .file-input { display: none; }

  .progress-summary {
    display: flex;
    gap: 16px;
    padding: 12px 14px;
    background: var(--bg-soft);
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .progress-summary b { color: var(--accent-dark); }
  
  /* 접기/펼치기 */
  .hidden { display: none !important; }
/* 재고 관리 페이지 스타일 */
.stock-info-box {
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 20px;
  font-size: 12px;
  color: #0369a1;
}

.stock-filter-box {

<script>
/* ========================================
   bookang v0.3
   - 엑셀 업로드 + 컬럼 매칭 + 강사 수동 입력
   - 학생-반 데이터 저장 및 조회
   ======================================== */

const STORAGE_KEY = 'bookang_data_v1';

// 간단한 비밀번호 해시 (SHA-256 대신 간단한 방식)
function hashPassword(password) {
  // 간단한 해시 (실제로는 더 강력한 방식 사용 권장)
  let hash = 0;
  for (let i = 0; i < password.length; i++) {
    const char = password.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return Math.abs(hash).toString(16);
}

// ---------- Data Layer ----------
function getDefault() {
  // 빈 초기 상태 - 엑셀 업로드부터 시작
  return {
    version: 3,
    currentTargetId: null,
    currentUserId: null, // 로그인한 사용자 ID
    users: [
      // 초기 관리자 계정
      {
        id: 'admin',
        name: '관리자',
        password: hashPassword('3500'),
        role: 'admin' // admin, staff, accounting
      }
    ],
    targets: [],
    teachersDirectory: [],
    data: {},
    studentsTab: 'list',
    rosterFilter: null
  };
}
// localStorage 사용 가능 여부 체크
let storageAvailable = false;
try {
  const test = '__storage_test__';
  localStorage.setItem(test, test);
  localStorage.removeItem(test);
  storageAvailable = true;
} catch (e) {
  console.warn('localStorage 사용 불가 (file:// 프로토콜). 데이터는 페이지를 닫으면 사라집니다.');
  storageAvailable = false;
}

function loadData() {
  if (!storageAvailable) {
    return getDefault();
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefault();
    const parsed = JSON.parse(raw);
    if (!parsed.targets) parsed.targets = [];
    if (!parsed.teachersDirectory) parsed.teachersDirectory = [];
    if (!parsed.data) parsed.data = {};
    if (!parsed.currentUser) parsed.currentUser = '이형빈';
    // 마이그레이션
    Object.values(parsed.data).forEach(td => {
      if (!td.books) td.books = [];
      td.books.forEach(b => {
        if (b.stockIn === undefined) b.stockIn = 0;
      });
      if (td.classes) {
        td.classes.forEach(c => {
          if (!c.bookIds) c.bookIds = [];
        });
      }
      if (!td.stockHistory) td.stockHistory = [];
      if (!td.distributions) td.distributions = {};
    });
    return parsed;
  } catch (e) {
    console.error('데이터 로드 실패', e);
    return getDefault();
  }
}

// ============================================================
// BOOK UNISSUED CALCULATION (환불 프로그램 연동용 - Firebase)
// ============================================================

// 학생별 교재 미배부 총액 계산
// Firebase 경로: shared/bookUnissued
// 형식: {"학생이름": {total: 금액}, ...}
// 
// ⚠️ Firebase 초기화 필요:
// HTML <head>에 Firebase SDK 추가 후 초기화 코드 작성
// 자세한 내용은 HTML 파일 상단의 주석 참고

function calculateBookUnissued() {
  const td = getCurrentTargetData();
  if (!td) {
    // 대상이 없으면 빈 객체 저장
    try {
      if (typeof firebase !== 'undefined' && firebase.database) {
        firebase.database().ref('shared/bookUnissued').set({});
      }
    } catch (e) {
      console.error('Firebase bookUnissued 저장 실패:', e);
    }
    return;
  }
  
  const result = {};
  
  td.students.forEach(student => {
    let total = 0;
    
    // 학생이 속한 모든 반의 교재 수집
    const studentBooks = new Set();
    (student.classIds || []).forEach(classId => {
      const cls = td.classes.find(c => c.id === classId);
      if (cls && cls.bookIds) {
        cls.bookIds.forEach(bookId => studentBooks.add(bookId));
      }
    });
    
    // 각 교재에 대해 배부 여부 확인
    studentBooks.forEach(bookId => {
      const book = td.books.find(b => b.id === bookId);
      if (!book) return;
      
      // 1. 정규 배부 확인 (distributions)
      const distKey = `${student.id}_${bookId}`;
      const regularDist = td.distributions && 
                          td.distributions[distKey] && 
                          td.distributions[distKey].status === 'distributed';
      
      // 2. 추가 배부 확인 (additionalDistributions)
      const additionalDist = (td.additionalDistributions || []).some(d => 
        d.bookId === bookId && d.studentName === student.name
      );
      
      // 배부되지 않았으면 금액 합산
      if (!regularDist && !additionalDist) {
        total += book.price || 0;
      }
    });
    
    result[student.name] = { total };
  });
  
  // Firebase에 저장
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      firebase.database().ref('shared/bookUnissued').set(result)
        .then(() => {
          console.log('📊 Firebase bookUnissued 업데이트 완료:', Object.keys(result).length, '명');
        })
        .catch((error) => {
          console.error('❌ Firebase bookUnissued 저장 실패:', error);
          // Firebase 실패 시 localStorage에 백업 저장
          try {
            localStorage.setItem('bookUnissued_backup', JSON.stringify(result));
            console.log('💾 localStorage 백업 저장 완료');
          } catch (e) {
            console.error('백업 저장도 실패:', e);
          }
        });
    } else {
      console.warn('⚠️ Firebase가 초기화되지 않았습니다. bookUnissued 저장을 건너뜁니다.');
      console.warn('Firebase 설정을 추가하려면 HTML <head>에 Firebase SDK와 초기화 코드를 넣으세요.');
    }
  } catch (e) {
    console.error('❌ Firebase bookUnissued 저장 중 오류:', e);
  }
}

// 학생 목록을 Firebase에 저장
// Firebase 경로: shared/students
// 형식: {"학생이름": true, ...}
function saveStudentsToFirebase() {
  const td = getCurrentTargetData();
  if (!td) {
    // 대상이 없으면 빈 객체 저장
    try {
      if (typeof firebase !== 'undefined' && firebase.database) {
        firebase.database().ref('shared/students').set({});
      }
    } catch (e) {
      console.error('Firebase students 저장 실패:', e);
    }
    return;
  }
  
  const result = {};
  
  // 모든 학생을 {"이름": true} 형태로 저장
  td.students.forEach(student => {
    result[student.name] = true;
  });
  
  // Firebase에 저장
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      firebase.database().ref('shared/students').set(result)
        .then(() => {
          console.log('👥 Firebase students 업데이트 완료:', Object.keys(result).length, '명');
        })
        .catch((error) => {
          console.error('❌ Firebase students 저장 실패:', error);
          // Firebase 실패 시 localStorage에 백업 저장
          try {
            localStorage.setItem('students_backup', JSON.stringify(result));
            console.log('💾 localStorage 백업 저장 완료 (students)');
          } catch (e) {
            console.error('백업 저장도 실패:', e);
          }
        });
    } else {
      console.warn('⚠️ Firebase가 초기화되지 않았습니다. students 저장을 건너뜁니다.');
    }
  } catch (e) {
    console.error('❌ Firebase students 저장 중 오류:', e);
  }
}

function saveData() {
  if (!storageAvailable) {
    console.warn('localStorage 사용 불가 - 데이터가 저장되지 않습니다');
    return;
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateDataInfo();
    calculateBookUnissued(); // 교재 미배부 총액 자동 업데이트
    saveStudentsToFirebase(); // 학생 목록 자동 업데이트
  } catch (e) {
    console.error('데이터 저장 실패', e);
    toast('저장 실패: localStorage를 사용할 수 없습니다', true);
  }
}

let state = loadData();

// ---------- Helpers ----------

// 현재 로그인한 사용자 정보
function getCurrentUser() {
  if (!state.currentUserId) return null;
  return state.users.find(u => u.id === state.currentUserId);
}

// 권한 체크
function hasPermission(action) {
  const user = getCurrentUser();
  if (!user) return false;
  
  const { role } = user;
  
  // 관리자: 모든 기능 (관리자 삭제 제외)
  if (role === 'admin') {
    if (action === 'delete_admin') return false;
    return true;
  }
  
  // 직원: 입고/일괄배부 불가, 학생 개인별 배부 가능
  if (role === 'staff') {
    const allowed = [
      'view', 'add_class', 'edit_class', 'delete_class',
      'add_student', 'edit_student', 'delete_student',
      'distribute_individual', 'return_book'
    ];
    return allowed.includes(action);
  }
  
  // 총무: 입고 가능, 조회 모두 가능
  if (role === 'accounting') {
    const allowed = ['view', 'stock_in'];
    return allowed.includes(action);
  }
  
  return false;
}

// 로그인 체크
function checkLogin() {
  if (!state.currentUserId) {
    showLoginScreen();
    return false;
  }
  return true;
}

function uid(prefix='id') {
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function toast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' is-error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function showConfirm(opts) {
  console.log('=== showConfirm 호출 ===', opts.title);
  const { title, message, confirmText = '확인', cancelText = '취소', onConfirm } = opts;
  
  const html = `
    <div class="modal">
      <div class="modal-title">${escapeHtml(title)}</div>
      <div class="modal-desc" style="white-space: pre-line;">${escapeHtml(message)}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="confirmCancel">${escapeHtml(cancelText)}</button>
        <button class="btn btn-primary" id="confirmOk">${escapeHtml(confirmText)}</button>
      </div>
    </div>
  `;
  
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  console.log('모달 DOM 추가 완료');
  
  bd.querySelector('#confirmCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });
  
  bd.querySelector('#confirmOk').onclick = () => {
    const result = onConfirm ? onConfirm() : true;
    if (result !== false) bd.remove();
  };
}

function getCurrentTargetData() {
  const tid = state.currentTargetId;
  if (!tid) return null;
  if (!state.data[tid]) state.data[tid] = { classes: [], students: [], books: [] };
  if (!state.data[tid].books) state.data[tid].books = [];
  return state.data[tid];
}

function getCurrentTargetName() {
  const target = state.targets.find(t => t.id === state.currentTargetId);
  return target ? target.name : '(선택된 대상 없음)';
}

function ensureTeacherInDirectory(name) {
  name = (name || '').trim();
  if (!name) return;
  if (!state.teachersDirectory.includes(name)) {
    state.teachersDirectory.push(name);
  }
}

// ---------- Modal ----------
function showModal({ title, desc, inputValue, placeholder, hint, warning, confirmText, confirmStyle, onConfirm, sizeClass }) {
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const showInput = inputValue !== undefined;
  backdrop.innerHTML = `
    <div class="modal draggable-modal ${sizeClass || ''}">
      <div class="modal-title drag-handle" style="cursor: move;">${escapeHtml(title)} <span style="font-size:11px;font-weight:400;color:var(--text-faint);float:right;">⋮⋮ 드래그</span></div>
      ${desc ? `<div class="modal-desc">${desc}</div>` : ''}
      ${warning ? `<div class="modal-warning">${warning}</div>` : ''}
      ${showInput ? `
        <input type="text" class="modal-input" id="modalInput" value="${escapeHtml(inputValue)}" placeholder="${escapeHtml(placeholder || '')}">
        ${hint ? `<div class="modal-hint">${hint}</div>` : '<div class="modal-hint"></div>'}
        <div class="modal-error" id="modalError"></div>
      ` : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">취소</button>
        <button class="btn ${confirmStyle === 'danger' ? 'btn-secondary btn-danger' : 'btn-primary'}" id="modalConfirm">
          ${escapeHtml(confirmText || '확인')}
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  makeDraggable(backdrop.querySelector('.draggable-modal'));

  const close = () => backdrop.remove();
  backdrop.querySelector('#modalCancel').onclick = close;
  // 배경 클릭으로 닫기 제거 (드래그 중 의도치 않게 닫히는 거 방지)

  const inputEl = backdrop.querySelector('#modalInput');
  const errorEl = backdrop.querySelector('#modalError');
  if (inputEl) {
    inputEl.focus();
    inputEl.select();
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') backdrop.querySelector('#modalConfirm').click();
      if (e.key === 'Escape') close();
    });
  }

  backdrop.querySelector('#modalConfirm').onclick = () => {
    const value = inputEl ? inputEl.value.trim() : null;
    const result = onConfirm(value, (msg) => { if (errorEl) errorEl.textContent = msg; });
    if (result !== false) close();
  };
}

// 모든 모달 닫기
function closeModal() {
  document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
}

// ---------- Target operations ----------
function addTarget() {
  showModal({
    title: '새 대상 추가',
    desc: '학기·시기 단위로 데이터를 분리해서 관리합니다.',
    inputValue: '',
    placeholder: '예: 27선행반, 27개념반, 26윈터',
    hint: '학년도 + 시기명 형식을 권장합니다',
    confirmText: '추가',
    onConfirm: (name, setError) => {
      if (!name) { setError('이름을 입력해주세요.'); return false; }
      if (state.targets.some(t => t.name === name)) {
        setError('이미 같은 이름의 대상이 있습니다.');
        return false;
      }
      const t = { id: uid('t'), name, createdAt: new Date().toISOString() };
      state.targets.unshift(t);
      state.data[t.id] = { classes: [], students: [] };
      if (!state.currentTargetId) state.currentTargetId = t.id;
      saveData();
      render();
      toast(`'${name}' 추가됨`);
    }
  });
}

function renameTarget(id) {
  const t = state.targets.find(x => x.id === id);
  if (!t) return;
  showModal({
    title: '대상 이름 변경',
    inputValue: t.name,
    placeholder: '대상 이름',
    confirmText: '저장',
    onConfirm: (name, setError) => {
      if (!name) { setError('이름을 입력해주세요.'); return false; }
      if (state.targets.some(x => x.id !== id && x.name === name)) {
        setError('이미 같은 이름의 대상이 있습니다.');
        return false;
      }
      t.name = name;
      saveData();
      render();
      toast('이름 변경됨');
    }
  });
}

function deleteTarget(id) {
  const t = state.targets.find(x => x.id === id);
  if (!t) return;
  const td = state.data[id];
  const studentCount = td?.students?.length || 0;
  const classCount = td?.classes?.length || 0;
  const bookCount = td?.books?.length || 0;
  showModal({
    title: `'${t.name}' 대상을 삭제할까요?`,
    desc: `학생 ${studentCount}명, 반 ${classCount}개, 교재 ${bookCount}개의 데이터가 함께 삭제됩니다.`,
    warning: '⚠ 되돌릴 수 없습니다.',
    confirmText: '삭제',
    confirmStyle: 'danger',
    onConfirm: () => {
      state.targets = state.targets.filter(x => x.id !== id);
      delete state.data[id];
      if (state.currentTargetId === id) {
        state.currentTargetId = state.targets[0]?.id || null;
      }
      saveData();
      render();
      toast('삭제됨');
    }
  });
}

// ============================================================
// SETTINGS MODAL & FULL RESET
// ============================================================

function showSettingsModal() {
  const totalTargets = state.targets.length;

        if (input && input.value === '전체초기화') {
          executeFullReset();
        } else {

function executeFullReset() {
  try {
    // 1. localStorage 완전 초기화
    localStorage.clear();
    
    // 2. Firebase 초기화
    if (typeof firebase !== 'undefined' && firebase.database) {
      firebase.database().ref('shared/bookUnissued').set({});
      firebase.database().ref('shared/students').set({});
    }
    
    // 3. 성공 메시지
    toast('✅ 전체 초기화 완료! 페이지를 새로고침합니다...', false);
    
    // 4. 1초 후 새로고침
    setTimeout(() => {
      location.reload();
    }, 1000);
    
  } catch (e) {
    console.error('초기화 실패:', e);
    toast('❌ 초기화 중 오류가 발생했습니다', true);
  }
}

function executeDeleteStudents() {
  try {
    const td = getCurrentTargetData();
    
    // 1. Firebase에서 학생 제거
    if (td.students && typeof firebase !== 'undefined' && firebase.database) {
      td.students.forEach(s => {
        firebase.database().ref(`shared/students/${s.name}`).remove();
        firebase.database().ref(`shared/bookUnissued/${s.name}`).remove();
      });
    }
    
    // 2. 학생 삭제
    td.students = [];
    
    // 3. 배부 기록 삭제
    if (td.distributions) {
      td.distributions = {};
    }
    
    // 4. 저장
    saveData();
    
    toast('✅ 모든 학생이 삭제되었습니다', false);
    render();
    
  } catch (e) {
    console.error('학생 삭제 실패:', e);
    toast('❌ 삭제 중 오류가 발생했습니다', true);
  }
}

let uploadState = { uploadStep: 'default' }; // 업로드 진행 중 임시 상태

function startUploadFlow(step) {
  if (!state.currentTargetId) {
    toast('먼저 대상을 선택해주세요', true);
    return;
  }
  uploadState = uploadState || {}; // null 체크
  uploadState.uploadStep = step || 'default';  // step1, step2, default
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const wsName = wb.SheetNames[0];
    const ws = wb.Sheets[wsName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    if (rows.length < 2) {
      toast('엑셀에 데이터가 없습니다', true);
      return;
    }

    // 헤더 찾기: 보통 1행. 비어있으면 첫 non-empty row
    let headerRowIdx = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      if (rows[i].some(c => String(c).trim())) { headerRowIdx = i; break; }
    }
    const headers = rows[headerRowIdx].map((h, i) => ({
      idx: i,
      letter: XLSX.utils.encode_col(i),
      name: String(h || '').trim() || `(빈 헤더 ${XLSX.utils.encode_col(i)})`,
      sample: ''
    }));

    // 첫 데이터 행에서 샘플
    for (let i = headerRowIdx + 1; i < rows.length; i++) {
      const row = rows[i];
      if (row.some(c => String(c).trim())) {
        headers.forEach(h => { h.sample = String(row[h.idx] || '').trim(); });
        break;
      }
    }

    // uploadStep 먼저 저장
    const currentStep = uploadState?.uploadStep || 'default';
    
    uploadState = {
      headers,
      rows: rows.slice(headerRowIdx + 1).filter(r => r.some(c => String(c).trim())),
      mapping: {}, // colIdx → { type: 'studentName'|'subject'|'ignore', subjectName?: string }
      uploadStep: currentStep
    };
    
    console.log('=== 파일 업로드 ===');
    console.log('uploadStep:', uploadState.uploadStep);

    // STEP1 업로드는 자동 처리 (컬럼 매칭 불필요)
    if (uploadState.uploadStep === 'step1') {
      console.log('Step1 자동 처리 시작');
      processStep1Upload();
      return;
    }

    // STEP2도 자동 처리!
    if (uploadState.uploadStep === 'step2') {
      console.log('Step2 자동 처리 시작');
      processStep2Upload();
      return;
    }

    console.log('기본 업로드 - 컬럼 매칭 화면');

    // 기본 업로드는 컬럼 매칭 필요
    uploadState.mapping[headers[0].idx] = { type: 'studentName' };
    for (let i = 1; i < headers.length; i++) {
      uploadState.mapping[headers[i].idx] = { type: 'ignore' };
    }

    openColumnMatchModal();
  } catch (err) {
    console.error(err);
    toast('엑셀 파일을 읽을 수 없습니다: ' + err.message, true);
  }
});

function processStep1Upload() {
  // STEP1: 반-교재 매칭 엑셀 파싱
  // 형식: 과목 | 강사 | 반 | 교재1 | 교재비1 | 교재2 | 교재비2 | ...
  
  try {
    const td = getCurrentTargetData();
    const rows = uploadState.rows;
    
    if (!rows || rows.length === 0) {
      toast('엑셀에 데이터가 없습니다', true);
      return;
    }
    
    // 헤더에서 교재 컬럼 찾기
    const headers = uploadState.headers.map(h => h.name.toLowerCase());
    const subjectIdx = headers.findIndex(h => h.includes('과목'));
    const teacherIdx = headers.findIndex(h => h.includes('강사'));
    const classIdx = headers.findIndex(h => h.includes('반'));
    
    if (subjectIdx === -1 || classIdx === -1) {
      toast('엑셀에 "과목"과 "반" 컬럼이 필요합니다', true);
      return;
    }
    
    // 교재 컬럼들 찾기 (교재1, 교재2, ...)
    const bookColIndices = [];
    for (let i = 0; i < headers.length; i++) {
      if (headers[i].includes('교재') && !headers[i].includes('비')) {
        bookColIndices.push(i);
      }
    }
    
    // 반-교재 데이터 파싱
    const classBookMap = {}; // key: subject||teacher||className → { subject, teacher, className, books: [{name, price}] }
    
    rows.forEach(row => {
      const subject = String(row[subjectIdx] || '').trim();
      const teacher = teacherIdx !== -1 ? String(row[teacherIdx] || '').trim() : '';
      const className = String(row[classIdx] || '').trim();
      
      if (!subject || !className) return;
      
      const key = `${subject}||${teacher}||${className}`;
      
      if (!classBookMap[key]) {
        classBookMap[key] = {
          subject,
          teacher,
          className,
          books: []
        };
      }
      
      // 교재들 추가
      bookColIndices.forEach(bookIdx => {
        const bookName = String(row[bookIdx] || '').trim();
        if (!bookName) return;
        
        // 교재비 찾기 (다음 컬럼)
        const priceIdx = bookIdx + 1;
        const priceStr = String(row[priceIdx] || '').trim();
        const price = priceStr ? parseInt(priceStr.replace(/[^0-9]/g, '')) || null : null;
        
        classBookMap[key].books.push({ name: bookName, price });
      });
    });
    
    // 반 생성 및 교재 생성
    let newClasses = 0;
    let newBooks = 0;
    let totalBookAssignments = 0;
    
    Object.values(classBookMap).forEach(item => {
      const classKey = `${item.subject}||${item.className}`;
      
      // 반 찾기 또는 생성
      let cls = td.classes.find(c => c.subject === item.subject && c.className === item.className);
      
      if (!cls) {
        cls = {
          id: uid('c'),
          subject: item.subject,
          teacher: item.teacher,
          className: item.className,
          bookIds: [],
          createdAt: new Date().toISOString()
        };
        td.classes.push(cls);
        newClasses++;
      } else if (item.teacher && !cls.teacher) {
        cls.teacher = item.teacher;
      }
      
      // 강사 디렉토리에 추가
      if (item.teacher) ensureTeacherInDirectory(item.teacher);
      
      // 교재 생성 및 연결
      item.books.forEach(bookData => {
        // 교재 찾기 또는 생성
        let book = td.books.find(b => 
          b.name === bookData.name && 
          b.subject === item.subject &&
          (b.teacher === item.teacher || b.teacher === '' || item.teacher === '')
        );
        
        if (!book) {
          book = {
            id: uid('b'),
            name: bookData.name,
            subject: item.subject,
            teacher: item.teacher,
            price: bookData.price,
            stock: 0,
            createdAt: new Date().toISOString()
          };
          td.books.push(book);
          newBooks++;
        } else if (bookData.price && !book.price) {
          book.price = bookData.price;
        }
        
        // bookIds에 추가 (중복 방지)
        if (!cls.bookIds.includes(book.id)) {
          cls.bookIds.push(book.id);
          totalBookAssignments++;
        }
      });
    });
    
    saveData();
    uploadState = { uploadStep: 'default' }; // 초기화
    toast(`✅ ${newClasses}개 반, ${newBooks}개 교재 등록 완료! (${totalBookAssignments}건 매칭)`, false);
    render();
    
  } catch (error) {
    console.error('processStep1Upload 에러:', error);
    toast('1단계 엑셀 처리 중 오류 발생: ' + error.message, true);
  }
}

// 2단계 파일 처리
async function processStep2File(file) {
  try {
    console.log('=== 2단계 파일 처리 시작 ===');
    
    // 1. 엑셀 읽기
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws);
    
    console.log(`총 ${json.length}명 학생 데이터`);
    
    if (json.length === 0) {
      toast('엑셀에 데이터가 없습니다', true);
      return;
    }
    
    // 2. 컬럼 확인
    const firstRow = json[0];
    const columns = Object.keys(firstRow);
    console.log('컬럼:', columns);
    
    if (!columns.includes('성명')) {
      toast('"성명" 컬럼이 필요합니다', true);
      return;
    }
    
    // 3. 과목 컬럼 찾기 (성명, Email, 카드번호, 강사_, 비고 제외)
    const excludeWords = ['성명', 'email', '카드', '비고', '학년', '반', '학번', '전화', '연락'];
    const subjectColumns = columns.filter(col => {
      const lower = col.toLowerCase();
      const isExcluded = excludeWords.some(word => lower.includes(word));
      const isTeacher = col.startsWith('강사_');
      return !isExcluded && !isTeacher;
    });
    
    console.log(`과목 컬럼 ${subjectColumns.length}개:`, subjectColumns);
    
    if (subjectColumns.length === 0) {
      toast('과목 컬럼을 찾을 수 없습니다', true);
      return;
    }
    
    // 4. 데이터 처리
    const td = getCurrentTargetData();
    const classMap = {}; // 반 정보 수집
    const studentData = []; // 학생 정보 수집
    
    json.forEach(row => {
      const studentName = String(row['성명'] || '').trim();
      if (!studentName) return;
      
      const student = { name: studentName, classes: [] };
      
      subjectColumns.forEach(subject => {
        const cellValue = String(row[subject] || '').trim();
        if (!cellValue) return;
        
        // 반명 그대로 사용
        const className = cellValue;
        
        // 강사 추출 (마지막 단어)
        const parts = className.split(/\s+/);
        const teacher = parts[parts.length - 1] || '';
        
        // 반 정보 저장
        const key = `${subject}||${className}`;
        if (!classMap[key]) {
          classMap[key] = { subject, className, teacher };
        }
        
        // 학생의 반 저장
        student.classes.push({ subject, className });
      });
      
      studentData.push(student);
    });
    
    console.log(`반 ${Object.keys(classMap).length}개, 학생 ${studentData.length}명`);
    
    // 5. 반 생성
    let newClasses = 0;
    Object.values(classMap).forEach(item => {
      let cls = td.classes.find(c => 
        c.subject === item.subject && 
        c.className === item.className
      );
      
      if (!cls) {
        cls = {
          id: uid('c'),
          subject: item.subject,
          teacher: item.teacher,
          className: item.className,
          bookIds: [],
          createdAt: new Date().toISOString()
        };
        td.classes.push(cls);
        newClasses++;
      }
      
      // 강사 디렉토리에 추가
      if (item.teacher) ensureTeacherInDirectory(item.teacher);
    });
    
    // 6. 학생 생성 및 반 배정
    let newStudents = 0;
    let updatedStudents = 0;
    
    studentData.forEach(item => {
      let student = td.students.find(s => s.name === item.name);
      
      if (!student) {
        student = {
          id: uid('s'),
          name: item.name,
          classIds: [],
          createdAt: new Date().toISOString()
        };
        td.students.push(student);
        newStudents++;
      } else {
        updatedStudents++;
      }
      
      // 반 배정
      item.classes.forEach(({ subject, className }) => {
        const cls = td.classes.find(c => 
          c.subject === subject && 
          c.className === className
        );
        
        if (cls && !student.classIds.includes(cls.id)) {
          student.classIds.push(cls.id);
        }
      });
    });
    
    // 7. 저장
    saveData();
    toast(`✅ ${newClasses}개 반, ${newStudents}명 신규 학생, ${updatedStudents}명 업데이트!`, false);
    render();
    
    console.log('=== 2단계 업로드 완료! ===');
    
  } catch (error) {
    console.error('2단계 업로드 에러:', error);
    toast('업로드 중 오류 발생: ' + error.message, true);
  }
}

function renderTeacherAssignModal() {
  // 기존 백드롭 있으면 제거
  document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());

  const classes = uploadState.classList;
  const filledCount = classes.filter(c => c.teacher && c.teacher.trim()).length;
  const dirList = state.teachersDirectory;

  const html = `
    <div class="modal modal-xl">
      <div class="wizard-steps">
        <div class="wizard-step done">1. 컬럼 매칭 ✓</div>
        <div class="wizard-step active">2. 강사 입력</div>
        <div class="wizard-step">3. 저장</div>
      </div>
      <div class="modal-title">각 반의 강사 이름을 입력해주세요</div>
      <div class="modal-desc">
        같은 강사가 가르치는 반은 같은 이름을 입력하세요.
        모의고사·국매처럼 강사 개념이 없는 반은 과목명과 동일하게 입력하면 됩니다 (예: "모의고사").
        이미 등록된 강사가 반명에 포함되면 자동으로 채워집니다 (초록 배경).
      </div>

      <div class="progress-summary">
        <span>총 <b>${classes.length}개 반</b></span>
        <span>입력 완료 <b>${filledCount}개</b></span>
        <span>미입력 <b>${classes.length - filledCount}개</b></span>
      </div>

      ${dirList.length > 0 ? `
        <div class="notice notice-info" style="margin-bottom: 12px;">
          <b>등록된 강사 명단</b> (${dirList.length}명): ${dirList.map(n => `<span class="badge badge-teacher">${escapeHtml(n)}</span>`).join('')}
        </div>
      ` : ''}

      <div class="teacher-assign-list" id="teacherAssignList">
        ${classes.map((c, i) => renderTeacherAssignRow(c, i)).join('')}
      </div>

      <div class="modal-actions" style="margin-top: 16px;">
        <button class="btn btn-ghost" id="teacherBack">← 이전</button>
        <button class="btn btn-ghost" id="teacherCancel">취소</button>
        <button class="btn btn-primary" id="teacherNext">저장하기 →</button>
      </div>
    </div>
  `;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = html;
  document.body.appendChild(backdrop);

  backdrop.querySelector('#teacherCancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#teacherBack').onclick = () => { backdrop.remove(); openColumnMatchModal(); };

  // 강사 입력 이벤트
  backdrop.querySelectorAll('input.teacher-input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = +e.target.dataset.classIdx;
      classes[idx].teacher = e.target.value;
      classes[idx].isSuggested = false;
      e.target.classList.remove('is-suggested');

      // 같은 패턴 자동 채움: 이 반명이 다른 빈 반에서 같은 강사명을 포함할 가능성
      // 단순 규칙: 입력 끝났을 때 (blur에서) 같은 반명 패턴 검색
    });
    inp.addEventListener('blur', (e) => {
      const idx = +e.target.dataset.classIdx;
      const teacher = (classes[idx].teacher || '').trim();
      if (!teacher) return;
      ensureTeacherInDirectory(teacher);

      // 빈 반 중에 반명에 이 강사 이름이 포함된 것 자동 채움 (제안)
      let autofilled = 0;
      classes.forEach((c, i) => {
        if (i === idx) return;
        if (c.teacher && c.teacher.trim()) return;
        if (c.className.includes(teacher)) {
          c.teacher = teacher;
          c.isSuggested = true;
          autofilled++;
        }
      });
      if (autofilled > 0) {
        toast(`'${teacher}' 강사로 ${autofilled}개 반 자동 채움 (확인 후 수정 가능)`);
        renderTeacherAssignModal();
      } else {
        updateTeacherProgress(backdrop);
      }
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const idx = +e.target.dataset.classIdx;
        e.target.blur();
        // 다음 빈 칸으로 포커스
        const nextEmpty = backdrop.querySelector(`.teacher-assign-row[data-class-idx="${idx+1}"] input`);
        if (nextEmpty) nextEmpty.focus();
      }
    });
  });

  backdrop.querySelector('#teacherNext').onclick = () => {
    const empty = classes.filter(c => !c.teacher || !c.teacher.trim());
    if (empty.length > 0) {
      showModal({
        title: `미입력 반이 ${empty.length}개 있습니다`,
        desc: '빈 칸으로 저장하면 그 반은 강사 정보 없이 저장됩니다. 그래도 저장할까요?',
        confirmText: '그래도 저장',
        confirmStyle: 'danger',
        onConfirm: () => {
          backdrop.remove();
          finalizeUpload();
        }
      });
    } else {
      backdrop.remove();
      finalizeUpload();
    }
  };
}

function renderTeacherAssignRow(c, idx) {
  const isFilled = c.teacher && c.teacher.trim();
  const cls = isFilled ? 'is-filled' : 'is-empty';
  return `
    <div class="teacher-assign-row ${cls}" data-class-idx="${idx}">
      <span class="subject-tag">${escapeHtml(c.subject)}</span>
      <span title="${escapeHtml(c.className)}">${escapeHtml(c.className)} <span style="color:var(--text-faint);font-size:11px;">(${c.count}명)</span></span>
      <input type="text"
        class="teacher-input ${c.isSuggested ? 'is-suggested' : ''}"
        data-class-idx="${idx}"
        value="${escapeHtml(c.teacher || '')}"
        placeholder="강사명 입력"
        list="teacherDirectoryList">
    </div>
  `;
}

function updateTeacherProgress(backdrop) {
  // 진행 상황만 갱신하고 전체 리렌더는 안 함 (포커스 유지)
  // 간단히 텍스트만 업데이트
  const classes = uploadState.classList;
  const filled = classes.filter(c => c.teacher && c.teacher.trim()).length;
  const summary = backdrop.querySelector('.progress-summary');
  if (summary) {
    summary.innerHTML = `
      <span>총 <b>${classes.length}개 반</b></span>
      <span>입력 완료 <b>${filled}개</b></span>
      <span>미입력 <b>${classes.length - filled}개</b></span>
    `;
  }
  // 행 색상도 갱신
  backdrop.querySelectorAll('.teacher-assign-row').forEach(row => {
    const idx = +row.dataset.classIdx;
    const c = classes[idx];
    const isFilled = c.teacher && c.teacher.trim();
    row.classList.toggle('is-filled', isFilled);
    row.classList.toggle('is-empty', !isFilled);
  });
}

// ---------- Step 3: 저장 ----------
function finalizeUpload() {
  const td = getCurrentTargetData();
  const studentColEntry = Object.entries(uploadState.mapping).find(([k,m]) => m.type === 'studentName');
  const studentColIdx = +studentColEntry[0];
  const subjectCols = Object.entries(uploadState.mapping)
    .filter(([k,m]) => m.type === 'subject')
    .map(([k,m]) => ({ colIdx: +k, subjectName: m.subjectName }));

  // 반 등록 (중복 체크: subject + className + teacher 조합)
  const classMap = {}; // subject||className → classObj
  // 기존 반도 맵에 넣기
  td.classes.forEach(c => {
    const k = c.subject + '||' + c.className;
    classMap[k] = c;
  });

  uploadState.classList.forEach(c => {
    const k = c.subject + '||' + c.className;
    if (classMap[k]) {
      // 이미 존재. 강사가 비어있으면 채움
      if (!classMap[k].teacher && c.teacher) {
        classMap[k].teacher = c.teacher.trim();
      }
    } else {
      const obj = {
        id: uid('c'),
        subject: c.subject,
        className: c.className,
        teacher: (c.teacher || '').trim(),
        bookIds: [],
        createdAt: new Date().toISOString(),
      };
      classMap[k] = obj;
      td.classes.push(obj);
    }
    if (c.teacher && c.teacher.trim()) ensureTeacherInDirectory(c.teacher.trim());
  });

  // 학생 등록 + 학생-반 매핑
  const studentMap = {}; // name → studentObj
  td.students.forEach(s => { studentMap[s.name] = s; });

  let newStudents = 0, updatedStudents = 0, totalAssignments = 0;

  uploadState.rows.forEach(row => {
    const name = String(row[studentColIdx] || '').trim();
    if (!name) return;

    let stu = studentMap[name];
    if (!stu) {
      stu = { id: uid('s'), name, classIds: [] };
      td.students.push(stu);
      studentMap[name] = stu;
      newStudents++;
    } else {
      updatedStudents++;
    }

    subjectCols.forEach(sc => {
      const className = String(row[sc.colIdx] || '').trim();
      if (!className) return;
      const k = sc.subjectName + '||' + className;
      const cls = classMap[k];
      if (cls && !stu.classIds.includes(cls.id)) {
        stu.classIds.push(cls.id);
        totalAssignments++;
      }
    });
  });

  saveData();
  uploadState = null;
  render();
  toast(`업로드 완료: 신규 학생 ${newStudents}명, 기존 갱신 ${updatedStudents}명, 반 배정 ${totalAssignments}건`);
}

    render();
    toast(assigned > 0 ? `반 추가됨 (학생 ${assigned}명 배정)` : '반 추가됨');
  };

            ${otherStudents.length === 0
              ? '<div style="text-align:center;color:var(--text-dim);padding:30px 0;font-size:12px;">추가할 수 있는 학생이 없습니다.</div>'
              : otherStudents.map(s => `
                <div class="ecAddItem" data-name="${escapeHtml(s.name).toLowerCase()}" style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:5px;font-size:13px;">
                  <span>${escapeHtml(s.name)}</span>
                  <button class="btn btn-ghost btn-sm" data-add-sid="${s.id}" title="이 반에 추가">+ 추가</button>
                </div>
              `).join('')
            }
          </div>
        </div>
      </div>

      <div class="modal-error" id="ecError" style="margin-top: 12px;"></div>
      <div class="modal-actions" style="margin-top: 12px;">
        <button class="btn btn-ghost btn-danger" id="ecDelete" style="margin-right:auto;">반 삭제</button>
        <button class="btn btn-ghost" id="ecCancel">닫기</button>
        <button class="btn btn-primary" id="ecSave">저장</button>
      </div>
    </div>
  `;
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);
  bd.querySelector('#ecCancel').onclick = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) bd.remove(); });

  // 검색
  const enrSearch = bd.querySelector('#ecEnrolledSearch');
  if (enrSearch) {
    enrSearch.oninput = (e) => {
      const q = e.target.value.toLowerCase();
      bd.querySelectorAll('.ecEnrolledItem').forEach(it => {
        it.style.display = it.dataset.name.includes(q) ? '' : 'none';
      });
    };
  }
  const addSearch = bd.querySelector('#ecAddSearch');
  if (addSearch) {
    addSearch.oninput = (e) => {
      const q = e.target.value.toLowerCase();
      bd.querySelectorAll('.ecAddItem').forEach(it => {
        it.style.display = it.dataset.name.includes(q) ? '' : 'none';
      });
    };
  }

  // 제거/추가 액션 (즉시 반영)
  bd.querySelectorAll('[data-remove-sid]').forEach(btn => {
    btn.onclick = () => {
      const sid = btn.dataset.removeSid;
      const stu = td.students.find(s => s.id === sid);
      if (stu) {
        stu.classIds = stu.classIds.filter(id => id !== classId);
        saveData();
        bd.remove();
        editClass(classId); // 다시 열기
      }
    };
  });
  bd.querySelectorAll('[data-add-sid]').forEach(btn => {
    btn.onclick = () => {
      const sid = btn.dataset.addSid;
      const stu = td.students.find(s => s.id === sid);
      if (stu && !stu.classIds.includes(classId)) {
        stu.classIds.push(classId);
        saveData();
        bd.remove();
        editClass(classId); // 다시 열기
      }
    };
  });

  // 반 삭제
  bd.querySelector('#ecDelete').onclick = () => {
    bd.remove();
    showModal({
      title: `'${c.className}' 반을 삭제할까요?`,
      desc: `이 반에 속한 학생 ${enrolledStudents.length}명의 배정 정보도 함께 제거됩니다. (학생 자체는 삭제 안 됨)`,
      warning: '⚠ 되돌릴 수 없습니다.',
      confirmText: '삭제',
      confirmStyle: 'danger',
      onConfirm: () => {
        // 학생들의 classIds에서 이 반 제거
        td.students.forEach(s => {
          s.classIds = s.classIds.filter(id => id !== classId);
        });
        td.classes = td.classes.filter(x => x.id !== classId);
        saveData();
        render();
        toast('반 삭제됨');
      }
    });
  };

  // 정보 저장
  bd.querySelector('#ecSave').onclick = () => {
    const subject = bd.querySelector('#ecSubject').value.trim();
    const className = bd.querySelector('#ecClassName').value.trim();
    const teacher = bd.querySelector('#ecTeacher').value.trim();
    const err = bd.querySelector('#ecError');
    if (!subject || !className) { err.textContent = '과목과 반명은 필수입니다.'; return; }
    const k = subject + '||' + className;
    if (td.classes.some(x => x.id !== classId && (x.subject + '||' + x.className) === k)) {
      err.textContent = '같은 과목·반명의 다른 반이 있습니다.';
      return;
    }
    c.subject = subject;
    c.className = className;
    c.teacher = teacher;
    if (teacher) ensureTeacherInDirectory(teacher);
    saveData();
    bd.remove();
    render();
    toast('저장됨');
  };
}

// 학생 편집: 이름 수정 + 소속 반 추가/제거
function editStudent(studentId) {
  const td = getCurrentTargetData();
  const s = td.students.find(x => x.id === studentId);
  if (!s) return;

  const subjects = [...new Set(td.classes.map(c => c.subject))].sort();
  const selection = {};
  subjects.forEach(subj => { selection[subj] = { teacher: '', classId: '' }; });

  // 현재 학생의 반들을 selection에 채움
  s.classIds.forEach(cid => {
    const c = td.classes.find(x => x.id === cid);
    if (c && selection[c.subject] !== undefined) {
      selection[c.subject] = {
        teacher: c.teacher || '(강사 미입력)',
        classId: c.id
      };
    }
  });

  showStudentForm({
    title: '학생 편집',
    desc: '학생 정보와 소속 반을 수정합니다. 안 듣게 되는 과목은 강사를 "안 들음"으로 바꾸세요.',
    initialName: s.name,
    selection,
    showDelete: true,
    onDelete: () => {
      showModal({
        title: `'${s.name}' 학생을 삭제할까요?`,
        desc: '이 학생의 모든 반 배정 정보가 함께 제거됩니다.',
        warning: '⚠ 되돌릴 수 없습니다.',
        confirmText: '삭제',
        confirmStyle: 'danger',
        onConfirm: () => {
          td.students = td.students.filter(x => x.id !== studentId);
          saveData();
          render();
          toast('학생 삭제됨');
        }
      });
    },
    onConfirm: (name, finalSelection, setError) => {
      if (!name) { setError('학생명을 입력해주세요.'); return false; }
      if (td.students.some(x => x.id !== studentId && x.name === name)) {
        setError('같은 이름의 학생이 이미 있습니다.');
        return false;
      }
      s.name = name;
      s.classIds = Object.values(finalSelection).map(v => v.classId).filter(Boolean);
      saveData();
      render();
      toast('저장됨');
      return true;
    }
  });
}

function addBookManual() {
  if (!state.currentTargetId) { toast('대상을 먼저 선택하세요', true); return; }
  const td = getCurrentTargetData();

  const subjectsFromClasses = [...new Set(td.classes.map(c => c.subject))];
  const subjectsFromBooks = [...new Set(td.books.map(b => b.subject))];
  const subjects = [...new Set([...subjectsFromClasses, ...subjectsFromBooks])].sort();

  // 과목별 강사 매핑 함수
  function getTeachersForSubject(subj) {
    if (!subj) return [...new Set([...state.teachersDirectory, ...td.books.map(b => b.teacher)])].sort();
    const fromClasses = td.classes.filter(c => c.subject === subj).map(c => c.teacher).filter(Boolean);
    const fromBooks = td.books.filter(b => b.subject === subj).map(b => b.teacher);
    return [...new Set([...fromClasses, ...fromBooks])].sort();
  }

  // 모달 내부 임시 리스트
  let pendingBooks = []; // { subject, teacher, name, price }

  const html = `
    <div class="modal modal-lg draggable-modal">
      <div class="modal-title">교재 추가</div>
      <div class="modal-desc">새 교재를 입력하고 [+ 추가하기]를 누르면 아래 리스트에 쌓입니다. 마지막에 [모두 저장]으로 한꺼번에 저장됩니다.</div>

      <datalist id="addBookSubjectList">${subjects.map(s => `<option value="${escapeHtml(s)}">`).join('')}</datalist>
      <datalist id="addBookTeacherList"></datalist>

      <div style="background: var(--bg-soft); border-radius: 8px; padding: 14px; margin-bottom: 16px;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">새 교재 입력</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 2fr 100px auto; gap: 8px; align-items: end;">
          <div>
            <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">과목 *</label>
            <input type="text" class="modal-input" id="abSubject" list="addBookSubjectList" placeholder="예: 수학" style="margin-bottom:0;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">강사 * <span id="abTeacherHint" style="color:var(--text-faint);font-size:10px;"></span></label>
            <input type="text" class="modal-input" id="abTeacher" list="addBookTeacherList" placeholder="과목 먼저 선택" style="margin-bottom:0;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">교재명 *</label>
            <input type="text" class="modal-input" id="abName" placeholder="예: 인사이트_확통" style="margin-bottom:0;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">교재비 (원)</label>
            <input type="number" class="modal-input" id="abPrice" placeholder="15000" min="0" style="margin-bottom:0;">
          </div>
          <div>
            <button class="btn btn-secondary" id="abAddRow" style="white-space:nowrap;">+ 추가</button>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-faint);margin-top:6px;">교재명 또는 교재비에서 Enter 키를 눌러도 추가됩니다. 과목·강사는 다음 입력에 그대로 유지됩니다.</div>
        <div class="modal-error" id="abInlineError" style="margin-top:6px;"></div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div style="font-size:13px; font-weight:600;">
          추가될 교재 <span id="abListCount" style="color:var(--accent-dark);">0개</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="abClearAll" style="display:none;">전체 비우기</button>
      </div>

      <div id="abListContainer" style="border:1px solid var(--border); border-radius:8px; max-height: 280px; overflow-y: auto; background: var(--bg-card);">
        <div id="abListEmpty" style="text-align:center; padding: 30px 0; color:var(--text-faint); font-size:13px;">
          아직 추가된 교재가 없어요. 위에서 입력하고 [+ 추가] 또는 Enter를 누르세요.
        </div>
        <div id="abList"></div>
      </div>

      <div class="modal-error" id="abError" style="margin-top:12px;"></div>
      <div class="modal-actions" style="margin-top:14px;">
        <button class="btn btn-ghost" id="abCancel">취소</button>
        <button class="btn btn-primary" id="abSaveAll" disabled>모두 저장</button>
      </div>
    </div>
  `;

  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);

  const subjectInput = bd.querySelector('#abSubject');
  const teacherInput = bd.querySelector('#abTeacher');
  const nameInput = bd.querySelector('#abName');
  const priceInput = bd.querySelector('#abPrice');
  const teacherDatalist = bd.querySelector('#addBookTeacherList');
  const teacherHint = bd.querySelector('#abTeacherHint');
  const inlineError = bd.querySelector('#abInlineError');

  function updateTeacherOptions() {
    const subj = subjectInput.value.trim();
    const opts = getTeachersForSubject(subj);
    teacherDatalist.innerHTML = opts.map(t => `<option value="${escapeHtml(t)}">`).join('');
    if (subj && opts.length > 0) {
      teacherHint.textContent = `(${opts.length}명)`;
      if (!teacherInput.value) teacherInput.placeholder = `예: ${opts[0]}`;
    } else if (subj) {
      teacherHint.textContent = '(직접 입력)';
      teacherInput.placeholder = '강사명 직접 입력';
    } else {
      teacherHint.textContent = '';
      teacherInput.placeholder = '과목 먼저 선택';
    }
  }
  updateTeacherOptions();

  let composing = false;
  subjectInput.addEventListener('compositionstart', () => { composing = true; });
  subjectInput.addEventListener('compositionend', () => { composing = false; updateTeacherOptions(); });
  subjectInput.addEventListener('input', () => { if (!composing) updateTeacherOptions(); });
  subjectInput.addEventListener('change', updateTeacherOptions);

  function renderList() {
    const listEl = bd.querySelector('#abList');
    const emptyEl = bd.querySelector('#abListEmpty');
    const countEl = bd.querySelector('#abListCount');
    const saveBtn = bd.querySelector('#abSaveAll');
    const clearBtn = bd.querySelector('#abClearAll');

    countEl.textContent = `${pendingBooks.length}개`;
    saveBtn.textContent = pendingBooks.length > 0 ? `모두 저장 (${pendingBooks.length}개)` : '모두 저장';
    saveBtn.disabled = pendingBooks.length === 0;
    clearBtn.style.display = pendingBooks.length > 0 ? '' : 'none';

    if (pendingBooks.length === 0) {
      emptyEl.style.display = '';
      listEl.innerHTML = '';
      return;
    }
    emptyEl.style.display = 'none';
    listEl.innerHTML = pendingBooks.map((b, idx) => `
      <div style="display:grid; grid-template-columns: 1fr auto; align-items:center; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size:13px; cursor:pointer;" data-edit-idx="${idx}">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; pointer-events:none;">
          <span class="badge badge-subject">${escapeHtml(b.subject)}</span>
          <span class="badge badge-teacher">${escapeHtml(b.teacher)}</span>
          <span style="font-weight:500;">${escapeHtml(b.name)}</span>
          <span style="color:var(--text-dim);">${b.price ? b.price.toLocaleString() + '원' : '교재비 미입력'}</span>
        </div>
        <button class="btn btn-ghost btn-sm btn-danger" data-remove-idx="${idx}" title="제거" style="pointer-events:auto;">✕</button>
      </div>
    `).join('');

    listEl.querySelectorAll('[data-edit-idx]').forEach(div => {
      div.onclick = (e) => {
        if (e.target.closest('[data-remove-idx]')) return;
        const idx = +div.dataset.editIdx;
        const item = pendingBooks[idx];
        subjectInput.value = item.subject;
        teacherInput.value = item.teacher;
        nameInput.value = item.name;
        priceInput.value = item.price || '';
        updateTeacherOptions();
        pendingBooks.splice(idx, 1);
        renderList();
        nameInput.focus();
      };
    });
    listEl.querySelectorAll('[data-remove-idx]').forEach(btn => {
      btn.onclick = () => {
        pendingBooks.splice(+btn.dataset.removeIdx, 1);
        renderList();
      };
    });
  }

  function tryAddRow() {
    const subject = subjectInput.value.trim();
    const teacher = teacherInput.value.trim();
    const name = nameInput.value.trim();
    const price = priceInput.value.trim();

    inlineError.textContent = '';

    if (!subject || !teacher || !name) {
      inlineError.textContent = '과목·강사·교재명은 필수입니다.';
      return;
    }
    if (!price || parseInt(price, 10) <= 0) {
      inlineError.textContent = '교재비를 입력해주세요.';
      return;
    }

    const k = subject + '||' + teacher + '||' + name;

    // 기존 교재 중복 체크
    if (td.books.some(b => (b.subject + '||' + b.teacher + '||' + b.name) === k)) {
      inlineError.textContent = `이미 등록된 교재입니다: ${name}`;
      return;
    }
    // 리스트 내 중복 체크
    if (pendingBooks.some(b => (b.subject + '||' + b.teacher + '||' + b.name) === k)) {
      inlineError.textContent = `이미 리스트에 있습니다: ${name}`;
      return;
    }

    const priceNum = parseInt(price, 10);
    pendingBooks.push({
      subject, teacher, name,
      price: isNaN(priceNum) ? 0 : priceNum
    });
    renderList();

    // 교재명/교재비만 비우고 과목/강사는 유지
    nameInput.value = '';
    priceInput.value = '';
    nameInput.focus();
  }

  bd.querySelector('#abAddRow').onclick = tryAddRow;
  bd.querySelector('#abCancel').onclick = () => {
    if (pendingBooks.length > 0) {
      if (!confirm(`아직 저장 안 된 교재 ${pendingBooks.length}개가 있습니다. 정말 취소할까요?`)) return;
    }
    bd.remove();
  };
  bd.querySelector('#abClearAll').onclick = () => {
    if (confirm(`리스트의 ${pendingBooks.length}개 교재를 모두 비울까요?`)) {
      pendingBooks = [];
      renderList();
    }
  };

  // Enter 키로 빠른 추가 (교재명/교재비에서)
  [nameInput, priceInput].forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        tryAddRow();
      }
    });
  });

  bd.querySelector('#abSaveAll').onclick = () => {
    if (pendingBooks.length === 0) return;
    pendingBooks.forEach(b => {
      td.books.push({
        id: uid('b'),
        subject: b.subject,
        teacher: b.teacher,
        name: b.name,
        price: b.price,
        createdAt: new Date().toISOString()
      });
      ensureTeacherInDirectory(b.teacher);
    });
    saveData();
    const count = pendingBooks.length;
    bd.remove();
    render();
    toast(`교재 ${count}개 저장됨`);
  };

  subjectInput.focus();
  renderList();
}

function showPatternBookForm() {
  if (!state.currentTargetId) { toast('대상을 먼저 선택하세요', true); return; }
  const td = getCurrentTargetData();

  // 패턴 목록 (각 항목: { teacher, startWeek, endWeek })
  let patterns = [{ teacher: '', startWeek: '1', endWeek: '11' }];

  function renderPatternList() {
    const container = document.getElementById('patternList');
    container.innerHTML = patterns.map((p, idx) => `
      <div style="display:grid; grid-template-columns: 2fr 80px 80px auto; gap:8px; align-items:end; padding:8px; background:var(--bg-card); border-radius:6px;">
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">강사명 *</label>
          <input type="text" class="modal-input" data-idx="${idx}" data-field="teacher" value="${escapeHtml(p.teacher)}" placeholder="예: 수매T" style="margin-bottom:0;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">시작주</label>
          <input type="number" class="modal-input" data-idx="${idx}" data-field="startWeek" value="${p.startWeek}" min="1" style="margin-bottom:0;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:3px;">끝주</label>
          <input type="number" class="modal-input" data-idx="${idx}" data-field="endWeek" value="${p.endWeek}" min="1" style="margin-bottom:0;">
        </div>
        <button class="btn btn-ghost btn-sm btn-danger" data-remove="${idx}">✕</button>
      </div>
    `).join('');

    // 입력 이벤트
    container.querySelectorAll('input').forEach(inp => {
      inp.oninput = () => {
        const idx = +inp.dataset.idx;
        const field = inp.dataset.field;
        patterns[idx][field] = inp.value;
        updatePreview();
      };
    });

    // 삭제 버튼
    container.querySelectorAll('[data-remove]').forEach(btn => {
      btn.onclick = () => {
        const idx = +btn.dataset.remove;
        patterns.splice(idx, 1);
        if (patterns.length === 0) patterns.push({ teacher: '', startWeek: '1', endWeek: '11' });
        renderPatternList();
      };
    });
  }

  function updatePreview() {
    const subject = document.getElementById('pbSubject').value.trim();
    const price = document.getElementById('pbPrice').value.trim();

    let total = 0;
    let details = [];

    patterns.forEach(p => {
      if (!p.teacher) return;
      const start = parseInt(p.startWeek, 10);
      const end = parseInt(p.endWeek, 10);
      if (isNaN(start) || isNaN(end) || start > end) return;

      const weekCount = end - start + 1;
      total += weekCount;
      details.push(`${p.teacher}: ${weekCount}개`);
    });

    const preview = document.getElementById('pbPreview');
    preview.innerHTML = `
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">생성될 교재: ${total}개</div>
      <div style="font-size:12px;color:var(--text-dim);">${details.join(' / ')}</div>
    `;
  }

  const html = `
    <div class="modal modal-lg draggable-modal">
      <div class="modal-title drag-handle" style="cursor:move;">패턴으로 교재 일괄 생성 <span style="font-size:11px;font-weight:400;color:var(--text-faint);float:right;">⋮⋮ 드래그</span></div>
      <div class="modal-desc">규칙적인 패턴의 교재(수매, 국매 등)를 빠르게 생성합니다. 강사별로 주차 범위를 설정하면 자동 생성됩니다.</div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;">
        <div>
          <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;">과목 *</label>
          <input type="text" class="modal-input" id="pbSubject" placeholder="예: 수매" style="margin-bottom:0;">
        </div>
        <div>
          <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;">교재비 (원) *</label>
          <input type="number" class="modal-input" id="pbPrice" placeholder="15000" min="0" style="margin-bottom:0;">
        </div>
      </div>

      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">강사별 주차 설정</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">교재명은 "{강사명}_{주차}주" 형식으로 자동 생성됩니다. 예: 수매T_1주, 수매T_2주 ...</div>
      <div id="patternList" style="display:grid; gap:8px; margin-bottom:10px;"></div>
      <button class="btn btn-ghost btn-sm" id="pbAddPattern">+ 강사 추가</button>

      <div id="pbPreview" style="margin-top:16px; padding:12px; background:var(--accent-light); border-radius:6px;"></div>

      <div class="modal-error" id="pbError" style="margin-top:12px;"></div>
      <div class="modal-actions" style="margin-top:14px;">
        <button class="btn btn-ghost" id="pbCancel">취소</button>
        <button class="btn btn-primary" id="pbGenerate">생성하기</button>
      </div>
    </div>
  `;

  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.innerHTML = html;
  document.body.appendChild(bd);

  makeDraggable(bd.querySelector('.draggable-modal'));

  renderPatternList();
  updatePreview();

  bd.querySelector('#pbSubject').oninput = updatePreview;
  bd.querySelector('#pbPrice').oninput = updatePreview;

  bd.querySelector('#pbAddPattern').onclick = () => {
    patterns.push({ teacher: '', startWeek: '1', endWeek: '11' });
    renderPatternList();
  };

  bd.querySelector('#pbCancel').onclick = () => bd.remove();

  bd.querySelector('#pbGenerate').onclick = () => {
    const subject = bd.querySelector('#pbSubject').value.trim();
    const price = bd.querySelector('#pbPrice').value.trim();
    const err = bd.querySelector('#pbError');
    err.textContent = '';

    if (!subject) {
      err.textContent = '과목을 입력해주세요.';
      return;
    }
    if (!price || parseInt(price, 10) <= 0) {
      err.textContent = '교재비를 입력해주세요.';
      return;
    }

    const priceNum = parseInt(price, 10);
    let generated = [];

    patterns.forEach(p => {
      if (!p.teacher) return;
      const start = parseInt(p.startWeek, 10);
      const end = parseInt(p.endWeek, 10);
      if (isNaN(start) || isNaN(end) || start > end) return;

      for (let week = start; week <= end; week++) {
        const name = `${p.teacher}_${week}주`;
        generated.push({ subject, teacher: p.teacher, name, price: priceNum });
      }
    });

    if (generated.length === 0) {
      err.textContent = '생성할 교재가 없습니다. 강사와 주차를 확인해주세요.';
      return;
    }

    // 중복 체크
    const duplicates = [];
    generated.forEach(g => {
      const key = `${g.subject}||${g.teacher}||${g.name}`;
      if (td.books.some(b => `${b.subject}||${b.teacher}||${b.name}` === key)) {
        duplicates.push(`${g.teacher} ${g.name}`);
      }
    });

    if (duplicates.length > 0) {
      err.textContent = `이미 등록된 교재가 있습니다: ${duplicates.slice(0, 3).join(', ')}${duplicates.length > 3 ? ` 외 ${duplicates.length - 3}개` : ''}`;
      return;
    }

    // 생성
    generated.forEach(g => {
      td.books.push({
        id: uid('b'),
        subject: g.subject,
        teacher: g.teacher,
        name: g.name,
        price: g.price,
        createdAt: new Date().toISOString()
      });
      ensureTeacherInDirectory(g.teacher);
    });

    saveData();
    bd.remove();
    render();
    toast(`교재 ${generated.length}개 생성됨`);
  };

  bd.querySelector('#pbSubject').focus();
}

function editBook(bookId) {
  const td = getCurrentTargetData();
  const b = td.books.find(x => x.id === bookId);
  if (!b) return;

  const subjectsFromClasses = [...new Set(td.classes.map(c => c.subject))];
  const subjectsFromBooks = [...new Set(td.books.map(bk => bk.subject))];
  const subjects = [...new Set([...subjectsFromClasses, ...subjectsFromBooks])].sort();

  const teachersFromBooks = [...new Set(td.books.map(bk => bk.teacher))];
  const teachers = [...new Set([...state.teachersDirectory, ...teachersFromBooks])].sort();

  showBookForm({
    title: '교재 편집',
    desc: '교재 정보를 수정합니다.',
    initial: { subject: b.subject, teacher: b.teacher, name: b.name, price: String(b.price || 0) },
    subjects, teachers,
    showDelete: true,
    onDelete: () => {
      showModal({
        title: `'${b.name}' 교재를 삭제할까요?`,
        desc: '이 교재의 매칭·배부 데이터도 함께 사라질 수 있습니다. (반-교재 매칭은 다음 단계에서 추가됩니다)',
        warning: '⚠ 되돌릴 수 없습니다.',
        confirmText: '삭제',
        confirmStyle: 'danger',
        onConfirm: () => {
          td.books = td.books.filter(x => x.id !== bookId);
          // 모든 반의 매칭에서도 제거
          td.classes.forEach(c => {
            if (c.bookIds) c.bookIds = c.bookIds.filter(id => id !== bookId);
          });
          saveData();
          render();
          toast('교재 삭제됨');
        }
      });
    },
    onConfirm: (data, setError) => {
      if (!data.subject || !data.teacher || !data.name) {
        setError('과목·강사·교재명은 필수입니다.');
        return false;
      }
      const k = data.subject + '||' + data.teacher + '||' + data.name;
      if (td.books.some(x => x.id !== bookId && (x.subject + '||' + x.teacher + '||' + x.name) === k)) {
        setError('같은 과목·강사·교재명의 다른 교재가 있습니다.');
        return false;
      }
      const price = parseInt(data.price, 10);
      b.subject = data.subject;
      b.teacher = data.teacher;
      b.name = data.name;
      b.price = isNaN(price) ? 0 : price;
      ensureTeacherInDirectory(data.teacher);
      saveData();
      render();
      toast('저장됨');
      return true;
    }
  });
}

        </div>
        <div>
          <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);">
            강사 * <span id="bfTeacherHint" style="color:var(--text-faint);font-size:11px;font-weight:400;"></span>
          </label>
          <input type="text" class="modal-input" id="bfTeacher" value="${escapeHtml(initial.teacher)}" list="bookTeacherList" placeholder="과목을 먼저 선택하세요" style="margin-bottom:0;">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 12px;">
        <div>
          <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);">교재명 *</label>
          <input type="text" class="modal-input" id="bfName" value="${escapeHtml(initial.name)}" placeholder="예: 인사이트_확통" style="margin-bottom:0;">
        </div>
        <div>
          <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);">교재비 (원)</label>
          <input type="number" class="modal-input" id="bfPrice" value="${escapeHtml(initial.price)}" placeholder="예: 15000" min="0" style="margin-bottom:0;">

      </div>

        ${showDelete ? '<button class="btn btn-ghost btn-danger" id="bfDelete" style="margin-right:auto;">교재 삭제</button>' : ''}
        <button class="btn btn-ghost" id="bfCancel">취소</button>
        ${showContinue ? '<button class="btn btn-secondary" id="bfContinue">저장하고 계속</button>' : ''}

      </div>

  // 배경 클릭으로 닫기 비활성화 (실수 방지 — 모달 드래그 시 의도치 않게 닫히는 것도 방지)

  const teacherDatalist = bd.querySelector('#bookTeacherList');

    const opts = getTeachersForSubject(subj);
    teacherDatalist.innerHTML = opts.map(t => `<option value="${escapeHtml(t)}">`).join('');
    if (subj && opts.length > 0) {
